<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>星际漫游 Star Roamer — 1000 Planets</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000}
  #app canvas{display:block}
  #lockHint{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:rgba(2,6,12,0.55);color:#cfe8ff;font-family:'Segoe UI',sans-serif;z-index:50;cursor:pointer;pointer-events:none}
  #lockHint h1{font-size:34px;letter-spacing:6px;color:#7af0ff;text-shadow:0 0 24px #1a6a9a;margin:0 0 12px 0}
  #lockHint div{font-size:15px;color:#9ac0dd}
  #errBox{position:fixed;left:10px;top:44px;color:#ff6b6b;font:12px Consolas;z-index:99;display:none;white-space:pre-wrap;max-width:90vw}
  #loading{position:fixed;inset:0;background:#04080e;color:#7af0ff;display:flex;align-items:center;justify-content:center;
    font-family:'Segoe UI',sans-serif;font-size:18px;letter-spacing:3px;z-index:100}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">正在生成 1000 颗星球…</div>
<div id="lockHint"><h1>星际漫游</h1><div>点击画面锁定鼠标开始 ｜ H 帮助 ｜ M 星图 ｜ 1000 颗星球等待探索 ｜ <span style="color:#ff8">build 20260718-11</span></div></div>
<div id="errBox"></div>
<script src="vendor/three.min.js?v=11"></script>
<script src="src/core.js?v=11"></script>
<script src="src/gfx.js?v=11"></script>
<script src="src/models.js?v=11"></script>
<script src="src/defs.js?v=11"></script>
<script src="src/galaxy.js?v=11"></script>
<script src="src/planets.js?v=11"></script>
<script src="src/audio.js?v=11"></script>
<script src="src/sim.js?v=11"></script>
<script src="src/ui.js?v=11"></script>
<script>
window.addEventListener('load',()=>{
  setTimeout(()=>{const l=document.getElementById('loading');if(l)l.remove()},120);
});
</script>
<script src="src/main.js?v=11"></script>
</body>
</html>
