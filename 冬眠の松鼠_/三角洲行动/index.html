<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲行动 · 网页版（同人复刻）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- 3D 画布容器 -->
  <div id="canvas-wrap"></div>

  <!-- HUD（局内） -->
  <div id="hud" class="hidden">
    <div id="compass"><canvas id="compass-canvas" width="600" height="34"></canvas></div>
    <div id="raid-timer">25:00</div>
    <div id="objective-tip"></div>

    <div id="crosshair">
      <div class="ch-line ch-t"></div><div class="ch-line ch-b"></div>
      <div class="ch-line ch-l"></div><div class="ch-line ch-r"></div>
      <div class="ch-dot"></div>
    </div>
    <div id="hitmarker"></div>

    <div id="hud-left">
      <div id="op-tag"><span id="op-name">—</span><span id="op-class"></span></div>
      <div id="hp-bar"><div id="hp-fill"></div><span id="hp-text">100</span></div>
      <div id="armor-row">
        <span id="armor-info">无护甲</span><span id="helmet-info">无头盔</span>
      </div>
      <div id="med-hint">[4] 使用医疗</div>
    </div>

    <div id="hud-right">
      <div id="weapon-name">—</div>
      <div id="ammo-box"><span id="ammo-mag">0</span><span id="ammo-sep">/</span><span id="ammo-reserve">0</span></div>
      <div id="fire-mode">全自动</div>
      <div id="ability-slot"><div id="ability-cd"></div><span id="ability-key">Q</span><span id="ability-name"></span></div>
    </div>

    <div id="interact-tip" class="hidden"></div>
    <div id="progress-wrap" class="hidden"><div id="progress-label"></div><div id="progress-bar"><div id="progress-fill"></div></div></div>
    <div id="extract-banner" class="hidden"></div>
    <div id="killfeed"></div>
    <div id="damage-vignette"></div>
    <div id="lowhp-vignette"></div>
    <div id="dmg-numbers"></div>
    <div id="reveal-tip" class="hidden">敌人已被标记</div>
  </div>

  <!-- 全屏地图 -->
  <div id="map-overlay" class="hidden">
    <div class="map-title">零号大坝 · 战术地图 <span class="map-close">[M] 关闭</span></div>
    <canvas id="map-canvas" width="820" height="820"></canvas>
  </div>

  <!-- 局内背包 / 搜索界面 -->
  <div id="inv-overlay" class="hidden">
    <div id="inv-window">
      <div id="inv-title">装备 <span class="inv-close">[Tab] 关闭</span></div>
      <div id="inv-columns">
        <div id="inv-loot-panel" class="inv-panel hidden">
          <div class="panel-head" id="loot-head">容器</div>
          <div class="grid-box" id="loot-grid"></div>
        </div>
        <div class="inv-panel">
          <div class="panel-head">装备栏</div>
          <div id="equip-list"></div>
          <div class="panel-head">胸挂 <span id="rig-cap"></span></div>
          <div class="grid-box" id="rig-grid"></div>
        </div>
        <div class="inv-panel">
          <div class="panel-head">背包 <span id="bag-cap"></span></div>
          <div class="grid-box" id="bag-grid"></div>
          <div class="panel-head safe-head">安全箱（阵亡保留） <span id="safe-cap"></span></div>
          <div class="grid-box" id="safe-grid"></div>
        </div>
      </div>
      <div id="inv-hint">左键点击战利品：拾取 ｜ 悬停物品可 使用 / 存入安全箱 / 丢弃</div>
    </div>
  </div>

  <!-- 菜单层（局外） -->
  <div id="menu-layer"></div>

  <!-- 全屏提示 -->
  <div id="toast"></div>
</div>

<script src="lib/three.min.js"></script>
<script src="lib/GLTFLoader.js"></script>
<script src="lib/SkeletonUtils.js"></script>
<script src="js/textures.js"></script>
<script src="js/models.js"></script>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/profile.js"></script>
<script src="js/modellib.js"></script>
<script src="js/world.js"></script>
<script src="js/player.js"></script>
<script src="js/ai.js"></script>
<script src="js/inventory.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
