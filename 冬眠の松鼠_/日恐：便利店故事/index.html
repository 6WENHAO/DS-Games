<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>深夜值班 - Night Shift</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- VHS / camcorder overlay -->
  <div id="vhs-overlay" class="hidden">
    <div id="rec"><span class="rec-dot"></span>REC</div>
    <div id="timestamp">2004:07:09<br><span id="clock">03:00:00</span></div>
    <div id="battery">▮▮▮▮ <span id="batt-pct">98%</span></div>
    <div id="tape-label">SP&nbsp;&nbsp;LP</div>
    <div class="vhs-noise"></div>
    <div class="scanlines"></div>
    <div class="tracking"></div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="crosshair">·</div>
    <div id="prompt" class="hidden"></div>
    <div id="objective">
      <div class="obj-title">今晚的工作</div>
      <ul id="task-list"></ul>
    </div>
    <div id="subtitle" class="hidden"></div>
    <div id="sanity-wrap"><div id="sanity-label">神志</div><div id="sanity-bar"><div id="sanity-fill"></div></div></div>
  </div>

  <!-- Note / reading overlay -->
  <div id="note-overlay" class="hidden">
    <div id="note-paper">
      <div id="note-text"></div>
      <div class="note-close">按［ E ］关闭</div>
    </div>
  </div>

  <!-- Title screen -->
  <div id="title-screen">
    <div class="title-inner">
      <div class="title-jp">深夜值班</div>
      <div class="title-en">N I G H T &nbsp; S H I F T</div>
      <div class="title-sub">—— 某个便利店的故事 ——</div>
      <button id="start-btn">开 始</button>
      <div class="title-hint">
        WASD 移动 &nbsp;/&nbsp; 鼠标 视角 &nbsp;/&nbsp; E 调查<br>
        F 手电筒 &nbsp;/&nbsp; SHIFT 跑步 &nbsp;/&nbsp; 推荐使用耳机
      </div>
      <div class="title-credit">仿 Chilla's Art 风格 &nbsp;·&nbsp; WebGL 演示</div>
    </div>
    <div class="scanlines"></div>
    <div class="vhs-noise"></div>
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden">
    <div class="load-text">加载中<span class="dots">...</span></div>
    <div class="load-bar"><div id="load-fill"></div></div>
  </div>

  <!-- Pause / click to resume -->
  <div id="pause-screen" class="hidden">
    <div class="pause-inner">
      <div class="pause-title">暂停</div>
      <div class="pause-hint">点击屏幕继续</div>
    </div>
  </div>

  <!-- Fade -->
  <div id="fade"></div>

  <!-- Jumpscare -->
  <div id="jumpscare" class="hidden"><img id="scare-img" alt=""></div>

  <!-- Ending -->
  <div id="ending" class="hidden">
    <div id="ending-text"></div>
    <button id="restart" class="hidden">再 来 一 次</button>
  </div>

  <canvas id="game"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/postprocess.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/world.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ghost.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
