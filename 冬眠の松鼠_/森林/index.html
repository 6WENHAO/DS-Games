<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Forest — Web</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🌲</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- 标题界面 -->
  <div id="title-screen" class="screen">
    <div class="title-inner">
      <h1>THE FOREST</h1>
      <p class="subtitle">网页版 · 生存 · 建造 · 求生</p>
      <div class="title-buttons">
        <button id="btn-new-game">新的游戏</button>
        <button id="btn-continue" disabled>继续游戏</button>
      </div>
      <div id="load-status">正在加载资源…</div>
      <div class="credits">素材：ambientCG / Poly Haven / Kenney / Game-Icons.net（CC0）</div>
    </div>
  </div>

  <!-- 死亡界面 -->
  <div id="death-screen" class="screen hidden">
    <div class="title-inner">
      <h1 class="death-title">你死了</h1>
      <p id="death-cause"></p>
      <div class="title-buttons">
        <button id="btn-respawn">重生</button>
      </div>
    </div>
  </div>

  <!-- 暂停菜单 -->
  <div id="pause-screen" class="screen hidden">
    <div class="title-inner">
      <h1>已暂停</h1>
      <div class="title-buttons">
        <button id="btn-resume">继续</button>
        <button id="btn-save">存档（需靠近庇护所）</button>
        <button id="btn-quit">回到标题</button>
      </div>
      <div class="help-block">
        <p>WASD 移动 · Shift 奔跑 · 空格 跳跃 · 鼠标左键 攻击/砍树</p>
        <p>E 互动 · I/Tab 物品栏 · B 生存手册（建造） · C 合成 · 1-5 快捷栏</p>
        <p>R 旋转蓝图 · Esc 暂停</p>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="crosshair">+</div>
    <div id="stats-panel">
      <div class="stat"><img src="assets/icons/heart-inside.svg" alt="HP"><div class="bar"><div id="bar-health" class="fill health"></div></div></div>
      <div class="stat"><img src="assets/icons/sprint.svg" alt="Stamina"><div class="bar"><div id="bar-stamina" class="fill stamina"></div></div></div>
      <div class="stat"><img src="assets/icons/chicken-leg.svg" alt="Hunger"><div class="bar"><div id="bar-hunger" class="fill hunger"></div></div></div>
      <div class="stat"><img src="assets/icons/drop.svg" alt="Thirst"><div class="bar"><div id="bar-thirst" class="fill thirst"></div></div></div>
      <div class="stat"><img src="assets/icons/night-sleep.svg" alt="Energy"><div class="bar"><div id="bar-energy" class="fill energy"></div></div></div>
    </div>
    <div id="clock-panel"><img src="assets/icons/watch.svg" alt=""><span id="clock-text">Day 1 08:00</span></div>
    <div id="interact-prompt" class="hidden"></div>
    <div id="notify-area"></div>
    <div id="hotbar"></div>
    <div id="damage-vignette"></div>
  </div>

  <!-- 物品栏 -->
  <div id="inventory-screen" class="panel-screen hidden">
    <div class="panel">
      <h2><img src="assets/icons/knapsack.svg" class="h-icon">物品栏</h2>
      <div id="inventory-grid"></div>
      <p class="panel-tip">点击物品：装备 / 使用</p>
    </div>
  </div>

  <!-- 合成 -->
  <div id="crafting-screen" class="panel-screen hidden">
    <div class="panel">
      <h2><img src="assets/icons/gears.svg" class="h-icon">合成</h2>
      <div id="crafting-list"></div>
    </div>
  </div>

  <!-- 生存手册（建造） -->
  <div id="book-screen" class="panel-screen hidden">
    <div class="panel book">
      <h2><img src="assets/icons/wood-cabin.svg" class="h-icon">生存手册</h2>
      <div id="building-list"></div>
      <p class="panel-tip">选择建筑后，移动到目标位置，左键放置蓝图，R 旋转</p>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
