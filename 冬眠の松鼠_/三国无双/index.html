<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真·三國無雙 WEB ～黄巾之乱～</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game"></canvas>

<!-- 全屏色调 -->
<div id="vignette"></div>
<div id="sorceryOverlay" style="display:none"></div>

<!-- 伤害数字层 -->
<div id="dmgLayer"></div>

<!-- ============ HUD ============ -->
<div id="hudTop">
  <div id="statusPanel">
    <div id="playerName"></div>
    <div class="barWrap">
      <div class="barLabel">体力</div>
      <div class="hpBar"><div id="hpFill" class="hpFill"></div></div>
      <div id="hpText" class="barText"></div>
    </div>
    <div class="barWrap">
      <div class="barLabel">无双</div>
      <div id="musouBar" class="musouBar"><div id="musouFill"></div></div>
    </div>
    <div id="buffIcons"></div>
  </div>

  <div id="rightPanel">
    <div id="timeBox">⏳ <span id="timeText">30:00</span></div>
    <canvas id="minimap"></canvas>
    <div id="objBox">作战目标<br><span id="objText"></span></div>
  </div>

  <div id="targetBar" class="targetBar" style="display:none">
    <div id="targetName"></div>
    <div class="targetTrack"><div id="targetFill"></div></div>
  </div>

  <div id="bossBar" style="display:none">
    <div id="bossName"></div>
    <div class="bossTrack"><div id="bossFill"></div></div>
  </div>

  <div id="msgLog"></div>

  <div id="comboBox" style="display:none">
    <span id="comboNum">0</span><span class="comboHits">HITS</span>
  </div>
</div>

<div id="hudBottom">
  <div id="koBox">击破 <span id="koCount">0</span> 人</div>
  <div id="moraleWrap">
    <span class="moraleTag moraleTagAlly">漢</span>
    <div id="moraleBar"><div id="moraleAlly"></div></div>
    <span class="moraleTag moraleTagEnemy">黃</span>
  </div>
  <div id="controlsHint">WASD移动 J攻击 K蓄力 L无双 空格跳 Shift防御 R上马 Q/E视角 Esc菜单</div>
</div>

<!-- 中央横幅 -->
<div class="bannerWrap" id="bannerWrap" style="display:none">
  <div id="banner"></div>
  <div id="bannerSub"></div>
</div>

<!-- 无双演出 -->
<div id="musouCut" style="display:none">
  <div id="musouCutText"></div>
</div>

<!-- ============ 标题画面 ============ -->
<div id="screenTitle" class="screen">
  <div class="titleLogo">
    <div class="titleShin">真</div>
    <div class="titleMain">三國無雙</div>
    <div class="titleSub">WEB ～ 黄巾之乱 ～</div>
  </div>
  <div class="titlePress">─ 按 回车 开始 ─</div>
  <div class="titleFoot">致敬 KOEI《真·三國無雙》系列 · 网页复刻习作</div>
</div>

<!-- ============ 选将画面 ============ -->
<div id="screenSelect" class="screen">
  <h1 class="selTitle">选 择 武 将</h1>
  <div id="heroCards"></div>
</div>

<!-- ============ 剧情介绍 ============ -->
<div id="screenIntro" class="screen">
  <div id="introText"></div>
</div>

<!-- ============ 结算 ============ -->
<div id="screenResult" class="screen">
  <h1 id="resultTitle"></h1>
  <h3 id="resultSub"></h3>
  <div id="resultStats"></div>
</div>

<!-- ============ 暂停 ============ -->
<div id="screenPause" class="screen screenDim">
  <h1 class="pauseTitle">— 军 议 —</h1>
  <div id="pauseInfo"></div>
</div>

<script src="js/three.min.js"></script>
<script src="js/sfx.js"></script>
<script src="js/data.js"></script>
<script src="js/models.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
