<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文明VI — 网页版</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
  <canvas id="map"></canvas>

  <!-- Top yield bar -->
  <div id="topbar" class="hud">
    <div class="civ-emblem" id="civEmblem">C</div>
    <div class="yield" id="yScience"><span class="ic sci">&#9877;</span><b>+0</b></div>
    <div class="yield" id="yCulture"><span class="ic cul">&#9834;</span><b>+0</b></div>
    <div class="yield" id="yGold"><span class="ic gold">&#164;</span><b>0</b><small id="goldRate">(+0)</small></div>
    <div class="yield" id="yFaith"><span class="ic faith">&#10013;</span><b>0</b><small id="faithRate">(+0)</small></div>
    <div class="sep"></div>
    <div class="era" id="eraLabel">远古时代</div>
    <div class="turnbox">第 <b id="turnNum">1</b> 回合<small id="yearLabel">公元前4000年</small></div>
  </div>

  <!-- Left research trays -->
  <div id="researchTray" class="hud">
    <div class="tray tech" id="techTray" title="科技研究（点击打开科技树）">
      <span class="tray-ic sci">&#9877;</span>
      <div class="tray-body">
        <div class="tray-name" id="techName">选择研究</div>
        <div class="progress"><div class="bar sci" id="techBar"></div></div>
        <div class="tray-turns" id="techTurns"></div>
      </div>
    </div>
    <div class="tray civic" id="civicTray" title="市政研究（点击打开市政树）">
      <span class="tray-ic cul">&#9834;</span>
      <div class="tray-body">
        <div class="tray-name" id="civicName">选择市政</div>
        <div class="progress"><div class="bar cul" id="civicBar"></div></div>
        <div class="tray-turns" id="civicTurns"></div>
      </div>
    </div>
  </div>

  <!-- Minimap + next turn -->
  <div id="bottomright" class="hud">
    <canvas id="minimap" width="220" height="130"></canvas>
    <button id="nextTurnBtn" class="next-turn">结束回合</button>
  </div>

  <!-- Unit / selection panel -->
  <div id="unitPanel" class="hud panel hidden">
    <div class="up-head">
      <div class="up-name" id="upName">单位</div>
      <div class="up-close" id="upClose">&times;</div>
    </div>
    <div class="up-stats" id="upStats"></div>
    <div class="up-actions" id="upActions"></div>
  </div>

  <!-- Tile info -->
  <div id="tileInfo" class="hud"></div>

  <!-- City panel -->
  <div id="cityPanel" class="overlay hidden">
    <div class="city-window">
      <div class="cw-header">
        <div class="cw-title" id="cwName">城市</div>
        <div class="cw-pop">人口 <b id="cwPop">1</b> &nbsp; <span id="cwGrowth"></span></div>
        <div class="cw-close" id="cwClose">&times;</div>
      </div>
      <div class="cw-body">
        <div class="cw-left">
          <div class="cw-section-title">产出</div>
          <div class="cw-yields" id="cwYields"></div>
          <div class="cw-section-title">区域与建筑</div>
          <div class="cw-districts" id="cwDistricts"></div>
        </div>
        <div class="cw-right">
          <div class="cw-section-title">生产 <span id="cwCurrent"></span></div>
          <div class="cw-produce-list" id="cwProduce"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tech/Civic tree overlay -->
  <div id="treePanel" class="overlay hidden">
    <div class="tree-window">
      <div class="tree-header">
        <div class="tree-tabs">
          <button class="tab active" id="tabTech">&#9877; 科技</button>
          <button class="tab" id="tabCivic">&#9834; 市政</button>
        </div>
        <div class="cw-close" id="treeClose">&times;</div>
      </div>
      <div class="tree-scroll"><div class="tree-canvas" id="treeCanvas"></div></div>
    </div>
  </div>

  <!-- Log / notifications -->
  <div id="log" class="hud"></div>

  <!-- Start screen -->
  <div id="startScreen" class="overlay">
    <div class="start-window">
      <h1>席德·梅尔的<br><span>文明VI</span></h1>
      <p class="tag">网页版</p>
      <div class="setup">
        <label>选择你的领袖与文明</label>
        <div class="leader-grid" id="leaderGrid"></div>
        <label>地图大小</label>
        <select id="mapSize">
          <option value="tiny">微型（44&times;26）</option>
          <option value="small" selected>小型（56&times;36）</option>
          <option value="standard">标准（74&times;46）</option>
        </select>
        <label>文明数量（含你自己）</label>
        <select id="numCivs">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <button id="startBtn" class="start-btn">建立你的帝国</button>
      <p class="hint">方向键 / 拖拽平移 &middot; 滚轮缩放 &middot; 回车 = 结束回合</p>
    </div>
  </div>
</div>

<script src="js/hex.js"></script>
<script src="js/data.js"></script>
<script src="js/map.js"></script>
<script src="js/game.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
