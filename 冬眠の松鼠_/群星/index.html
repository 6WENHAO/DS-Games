<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellaris Web</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="setup-screen" class="screen">
  <div class="setup-box">
    <h1 class="game-logo">STELLARIS</h1>
    <p class="subtitle">网页版 · Web Edition</p>
    <div class="setup-form">
      <label>帝国名称 <input id="s-empire-name" type="text" value="人类联合帝国"></label>
      <label>物种名称 <input id="s-species-name" type="text" value="人类"></label>
      <label>母星名称 <input id="s-homeworld-name" type="text" value="地球"></label>
      <div class="setup-row">
        <label>星系大小
          <select id="s-galaxy-size">
            <option value="40">微型 (40)</option>
            <option value="80" selected>小型 (80)</option>
            <option value="150">中型 (150)</option>
            <option value="250">大型 (250)</option>
          </select>
        </label>
        <label>AI 帝国数量
          <select id="s-ai-count">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="5">5</option>
          </select>
        </label>
      </div>
      <div class="setup-row">
        <label>政体
          <select id="s-authority">
            <option value="democratic">民主制</option>
            <option value="oligarchic">寡头制</option>
            <option value="dictatorial" selected>独裁制</option>
            <option value="imperial">帝制</option>
          </select>
        </label>
        <label>飞船外观
          <select id="s-color">
            <option value="#4a9eff" selected>蓝色</option>
            <option value="#ff5b5b">红色</option>
            <option value="#5bff8a">绿色</option>
            <option value="#ffd24a">黄色</option>
            <option value="#c86bff">紫色</option>
          </select>
        </label>
      </div>
      <div class="ethics-box">
        <div class="ethics-title">帝国理念 (选择最多 3 点)</div>
        <div id="ethics-list"></div>
        <div class="ethics-points">已用点数: <span id="ethics-points">0</span> / 3</div>
      </div>
    </div>
    <button id="start-game-btn" class="big-btn">开始游戏</button>
  </div>
</div>

<div id="game-screen" class="screen hidden">
  <!-- Top resource bar -->
  <div id="topbar">
    <div id="resource-bar"></div>
    <div id="time-controls">
      <span id="game-date">2200.01.01</span>
      <button data-speed="0" class="speed-btn">❚❚</button>
      <button data-speed="1" class="speed-btn active">▶</button>
      <button data-speed="2" class="speed-btn">▶▶</button>
      <button data-speed="3" class="speed-btn">▶▶▶</button>
    </div>
  </div>

  <!-- Main map area -->
  <div id="map-container">
    <canvas id="galaxy-canvas"></canvas>
    <div id="view-label"></div>
    <button id="back-to-galaxy" class="hidden">← 返回银河</button>
  </div>

  <!-- Left outliner -->
  <div id="outliner">
    <div class="outliner-header">概览</div>
    <div id="outliner-content"></div>
  </div>

  <!-- Bottom toolbar -->
  <div id="bottombar">
    <button class="tool-btn" data-panel="research">🔬 科技</button>
    <button class="tool-btn" data-panel="empire">🏛️ 帝国</button>
    <button class="tool-btn" data-panel="fleets">🚀 舰队</button>
    <button class="tool-btn" data-panel="diplomacy">🤝 外交</button>
    <button class="tool-btn" data-panel="market">💱 市场</button>
  </div>

  <!-- Side detail panel -->
  <div id="detail-panel" class="hidden">
    <button id="detail-close">✕</button>
    <div id="detail-content"></div>
  </div>

  <!-- Notification log -->
  <div id="notifications"></div>

  <!-- Modal -->
  <div id="modal" class="hidden">
    <div class="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/galaxy.js"></script>
<script src="js/economy.js"></script>
<script src="js/fleet.js"></script>
<script src="js/combat.js"></script>
<script src="js/ai.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
