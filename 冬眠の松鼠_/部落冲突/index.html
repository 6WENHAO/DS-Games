<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部落村庄 · Clash Village</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-root">
  <canvas id="game-canvas"></canvas>

  <!-- 加载界面 -->
  <div id="loading-screen">
    <div class="loading-box">
      <h1>部 落 村 庄</h1>
      <div class="loading-bar-outer"><div id="loading-bar" class="loading-bar-inner"></div></div>
      <div id="loading-text">正在加载资源…</div>
    </div>
  </div>

  <!-- 顶部 HUD -->
  <div id="hud-top" class="hidden">
    <div id="hud-player" class="hud-panel">
      <div id="hud-avatar"></div>
      <div class="hud-player-info">
        <div id="hud-name">酋长</div>
        <div class="xp-bar"><div id="xp-fill"></div><span id="xp-text"></span></div>
      </div>
      <div id="hud-trophy" class="hud-chip" title="奖杯">🏆 <span id="trophy-num">0</span></div>
    </div>
    <div id="hud-resources">
      <div class="res-bar" id="res-gold-bar">
        <div class="res-fill gold"></div>
        <img class="res-icon" src="assets/img/icons/gold.png" alt="gold">
        <span class="res-num" id="res-gold">0</span>
      </div>
      <div class="res-bar" id="res-elixir-bar">
        <div class="res-fill elixir"></div>
        <img class="res-icon" src="assets/img/icons/elixir.png" alt="elixir">
        <span class="res-num" id="res-elixir">0</span>
      </div>
      <div class="res-bar gems" id="res-gem-bar">
        <img class="res-icon" src="assets/img/icons/gem.png" alt="gem">
        <span class="res-num" id="res-gem">0</span>
      </div>
      <div id="builder-chip" class="hud-chip" title="空闲工人">🔨 <span id="builder-num">2/2</span></div>
    </div>
  </div>

  <!-- 底部按钮栏 -->
  <div id="hud-bottom" class="hidden">
    <button id="btn-shop" class="big-btn green"><span class="btn-ico">🏪</span>商店</button>
    <button id="btn-army" class="big-btn blue"><span class="btn-ico">⚔️</span>军队</button>
    <button id="btn-attack" class="big-btn red"><span class="btn-ico">🗡️</span>进攻！</button>
    <button id="btn-sound" class="round-btn" title="声音"><img id="sound-icon" src="assets/img/icons/audioOn.png"></button>
  </div>

  <!-- 建筑信息面板 -->
  <div id="info-panel" class="hidden">
    <div class="info-head">
      <span id="info-title">建筑</span>
      <span id="info-level" class="lv-chip">Lv.1</span>
      <button class="close-x" id="info-close">×</button>
    </div>
    <div id="info-desc"></div>
    <div id="info-stats"></div>
    <div class="info-actions">
      <button id="btn-info-collect" class="act-btn gold hidden">收集</button>
      <button id="btn-info-upgrade" class="act-btn green">升级</button>
      <button id="btn-info-finish" class="act-btn gem hidden">立即完成</button>
      <button id="btn-info-remove" class="act-btn red hidden">移除</button>
      <button id="btn-info-train" class="act-btn blue hidden">训练</button>
    </div>
  </div>

  <!-- 商店 -->
  <div id="shop-panel" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><h2>建筑商店</h2><button class="close-x" data-close="shop-panel">×</button></div>
      <div class="tab-row" id="shop-tabs">
        <button class="tab active" data-tab="economy">资源</button>
        <button class="tab" data-tab="defense">防御</button>
        <button class="tab" data-tab="army">军事</button>
        <button class="tab" data-tab="deco">装饰</button>
      </div>
      <div id="shop-grid" class="card-grid"></div>
    </div>
  </div>

  <!-- 军队面板 -->
  <div id="army-panel" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><h2>军队</h2><button class="close-x" data-close="army-panel">×</button></div>
      <div id="army-camp-info" class="army-sub"></div>
      <div id="army-current" class="army-row"></div>
      <h3 class="army-h3">训练部队 <span id="queue-info"></span></h3>
      <div id="train-grid" class="card-grid small"></div>
      <div id="train-queue" class="queue-row"></div>
      <h3 class="army-h3">法术</h3>
      <div id="spell-row" class="army-row"></div>
    </div>
  </div>

  <!-- 实验室升级面板 -->
  <div id="lab-panel" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><h2>实验室 · 部队研究</h2><button class="close-x" data-close="lab-panel">×</button></div>
      <div id="lab-grid" class="card-grid small"></div>
    </div>
  </div>

  <!-- 战斗 HUD -->
  <div id="battle-hud" class="hidden">
    <div id="battle-top">
      <div id="battle-timer" class="hud-panel">3:00</div>
      <div id="battle-stars">☆☆☆</div>
      <div id="battle-percent" class="hud-panel">0%</div>
      <div id="battle-loot" class="hud-panel">
        <span class="loot-item"><img src="assets/img/icons/gold.png">+<b id="loot-gold">0</b></span>
        <span class="loot-item"><img src="assets/img/icons/elixir.png">+<b id="loot-elixir">0</b></span>
      </div>
    </div>
    <div id="deploy-bar"></div>
    <div id="battle-actions">
      <button id="btn-battle-end" class="big-btn red">结束战斗</button>
      <button id="btn-battle-surrender" class="big-btn grey">投降</button>
    </div>
  </div>

  <!-- 搜索对手 -->
  <div id="scout-bar" class="hidden">
    <button id="btn-scout-attack" class="big-btn red">开始进攻</button>
    <button id="btn-scout-next" class="big-btn blue">换一个 (-<span id="scout-cost">50</span>金)</button>
    <button id="btn-scout-home" class="big-btn grey">返回村庄</button>
  </div>

  <!-- 结算 -->
  <div id="result-panel" class="modal hidden">
    <div class="modal-box result">
      <h2 id="result-title">胜利！</h2>
      <div id="result-stars" class="result-stars"></div>
      <div id="result-loot"></div>
      <button id="btn-result-home" class="big-btn green">回营</button>
    </div>
  </div>

  <!-- 放置确认 -->
  <div id="place-confirm" class="hidden">
    <button id="btn-place-ok" class="round-btn ok"><img src="assets/img/icons/checkmark.png"></button>
    <button id="btn-place-cancel" class="round-btn no"><img src="assets/img/icons/cross.png"></button>
  </div>

  <div id="toast-wrap"></div>
</div>

<script src="js/core/utils.js"></script>
<script src="js/core/audio.js"></script>
<script src="js/core/assets.js"></script>
<script src="js/core/input.js"></script>
<script src="js/data/config.js"></script>
<script src="js/data/buildings.js"></script>
<script src="js/data/troops.js"></script>
<script src="js/game/state.js"></script>
<script src="js/game/village.js"></script>
<script src="js/game/economy.js"></script>
<script src="js/game/training.js"></script>
<script src="js/game/battle/generator.js"></script>
<script src="js/game/battle/pathfind.js"></script>
<script src="js/game/battle/units.js"></script>
<script src="js/game/battle/defenses.js"></script>
<script src="js/game/battle/battle.js"></script>
<script src="js/render/camera.js"></script>
<script src="js/render/fx.js"></script>
<script src="js/render/renderer.js"></script>
<script src="js/ui/hud.js"></script>
<script src="js/ui/shop.js"></script>
<script src="js/ui/panels.js"></script>
<script src="js/ui/army.js"></script>
<script src="js/ui/battleui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
