<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DeepSeek 灰度节点生成的网页游戏作品集">
  <title>灰度节点 · 游戏实验场</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap");

    :root {
      --ink: #171916;
      --muted: #6e716b;
      --paper: #f1f0ea;
      --card: #faf9f4;
      --line: #d4d3cc;
      --acid: #dfff00;
      --deep: #2454ff;
      --shadow: 0 18px 45px rgba(24, 26, 22, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(23, 25, 22, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 25, 22, 0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      font-family: "Noto Sans SC", system-ui, sans-serif;
    }

    a {
      color: inherit;
    }

    .page-shell {
      width: min(1480px, calc(100% - 56px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 76px;
      border-bottom: 1px solid var(--line);
      font-family: "DM Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 500;
    }

    .brand-mark {
      position: relative;
      width: 18px;
      height: 18px;
      border: 2px solid var(--ink);
      border-radius: 50%;
    }

    .brand-mark::after {
      position: absolute;
      right: -5px;
      bottom: -4px;
      width: 8px;
      height: 8px;
      content: "";
      background: var(--acid);
      border: 1px solid var(--ink);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #36a852;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(54, 168, 82, 0.13);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 48px;
      align-items: end;
      padding: 88px 0 70px;
    }

    .eyebrow,
    .section-index,
    .game-number,
    .author-label,
    .footer {
      font-family: "DM Mono", monospace;
      text-transform: uppercase;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 20px;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .eyebrow::before {
      width: 34px;
      height: 3px;
      content: "";
      background: var(--deep);
    }

    h1 {
      max-width: 950px;
      margin: 0;
      font-size: clamp(54px, 7.7vw, 118px);
      font-weight: 900;
      letter-spacing: -0.075em;
      line-height: 0.9;
    }

    h1 span {
      position: relative;
      z-index: 0;
      display: inline-block;
    }

    h1 span::after {
      position: absolute;
      z-index: -1;
      right: -0.03em;
      bottom: 0.04em;
      left: 0.04em;
      height: 0.22em;
      content: "";
      background: var(--acid);
      transform: rotate(-1deg);
    }

    .hero-note {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .hero-note strong {
      display: block;
      margin-bottom: 10px;
      color: var(--ink);
      font-family: "DM Mono", monospace;
      font-size: 36px;
      font-weight: 500;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .catalog {
      padding-bottom: 100px;
    }

    .catalog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      border-top: 1px solid var(--ink);
      border-bottom: 1px solid var(--line);
    }

    .catalog-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .section-index {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 22px;
      padding-top: 28px;
    }

    .game-card {
      grid-column: span 4;
      min-width: 0;
      animation: reveal 0.65s both;
      animation-delay: calc(var(--order) * 75ms);
    }

    .game-card:nth-child(1),
    .game-card:nth-child(5) {
      grid-column: span 8;
    }

    .game-card:nth-child(1) .thumb,
    .game-card:nth-child(5) .thumb {
      aspect-ratio: 22 / 9;
    }

    .card-link {
      position: relative;
      display: block;
      height: 100%;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--line);
      text-decoration: none;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .card-link:hover,
    .card-link:has(.game-link:focus-visible) {
      border-color: var(--ink);
      box-shadow: var(--shadow);
      transform: translateY(-7px);
    }

    .game-link {
      position: absolute;
      z-index: 15;
      inset: 0;
      outline: none;
    }

    .thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--thumb-bg);
      isolation: isolate;
    }

    .thumb::after {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      content: "";
      background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255, 255, 255, 0.06) 4px);
      mix-blend-mode: overlay;
    }

    .game-number {
      position: absolute;
      z-index: 10;
      top: 14px;
      left: 14px;
      padding: 7px 9px;
      color: #fff;
      background: rgba(15, 16, 14, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.28);
      font-size: 10px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(5px);
    }

    .thumb-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: linear-gradient(135deg, #e8e6dc 0%, #ccc9b8 100%);
      transition: transform 500ms cubic-bezier(0.2, 0.7, 0, 1);
    }

    .thumb-img[src=""] {
      opacity: 0.45;
    }

    .card-link:hover .thumb-img {
      transform: scale(1.035);
    }

    .card-body {
      padding: 21px 22px 20px;
    }

    .game-title-row {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .game-title {
      margin: 0;
      font-size: clamp(19px, 2vw, 28px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.25;
    }

    .tag {
      flex: none;
      margin-top: 2px;
      padding: 4px 7px;
      color: var(--muted);
      border: 1px solid var(--line);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card-meta {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--line);
    }

    .author-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.08em;
    }

    .author-name {
      font-size: 13px;
      font-weight: 600;
    }

    .video-link {
      position: relative;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      color: #fff;
      background: var(--ink);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: background 180ms ease;
    }

    .video-link:hover {
      background: var(--deep);
      text-decoration: none;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      padding: 24px 0 34px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      font-size: 10px;
      letter-spacing: 0.06em;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      50% { box-shadow: 0 0 0 7px rgba(54, 168, 82, 0.05); }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 36px;
        padding: 64px 0 52px;
      }

      .hero-note {
        max-width: 480px;
      }

      .game-card,
      .game-card:nth-child(1),
      .game-card:nth-child(5) {
        grid-column: span 6;
      }

      .game-card .thumb {
        aspect-ratio: 3 / 1;
      }
    }

    @media (max-width: 620px) {
      .page-shell {
        width: min(100% - 28px, 1480px);
      }

      .topbar {
        min-height: 62px;
      }

      .status span:last-child {
        display: none;
      }

      .hero {
        padding: 52px 0 44px;
      }

      h1 {
        font-size: clamp(48px, 17vw, 72px);
      }

      .game-grid {
        gap: 18px;
      }

      .game-card,
      .game-card:nth-child(1),
      .game-card:nth-child(5) {
        grid-column: 1 / -1;
      }

      .game-card .thumb {
        aspect-ratio: 2.5 / 1;
      }

      .card-link:hover,
      .card-link:has(.game-link:focus-visible) {
        transform: translateY(-3px);
      }

      .footer {
        gap: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

      var src = game.thumb || "";
      var videoLink = game.videoUrl
        ? '<a class="video-link" href="' + game.videoUrl + '" target="_blank" rel="noopener noreferrer" aria-label="查看 ' + game.title + ' 的原视频">原视频 ↗</a>'

      var article = document.createElement("article");
      article.className = "game-card";
      article.style.setProperty("--order", index);
      article.innerHTML = '\n        <div class="card-link">\n          <a class="game-link" href="' + game.gameUrl + '" target="_blank" rel="noopener noreferrer" aria-label="开始游戏：' + game.title + '"></a>\n          <div class="thumb">\n            <img class="thumb-img" src="' + src + '" alt="' + game.title + '" loading="lazy">\n            <span class="game-number">EXP. ' + String(index + 1).padStart(2, "0") + '</span>\n          </div>\n          <div class="card-body">\n            <div class="game-title-row">\n              <h3 class="game-title">' + game.title + '</h3>\n              <span class="tag">' + game.tag + '</span>\n            </div>\n            <div class="card-meta">\n              <div>\n                <span class="author-label">Creator</span>\n                <span class="author-name">' + game.author + '</span>\n              </div>\n              ' + videoLink + '\n            </div>\n          </div>\n        </div>';
