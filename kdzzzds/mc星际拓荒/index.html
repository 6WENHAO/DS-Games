<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>方块星野 BlockWilds — 我的世界 × 星际拓荒</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-root">
    <canvas id="gl"></canvas>

    <!-- HUD 层 -->
    <div id="hud" class="ui-layer">
      <div id="crosshair"></div>
      <div id="hud-status">
        <div id="bar-health" class="seg-bar"></div>
        <div id="bar-oxygen" class="seg-bar"></div>
        <div id="bar-fuel" class="seg-bar"></div>
        <div id="bar-jet" class="jet-bar"><div id="jet-fill"></div></div>
      </div>
      <div id="hotbar"></div>
      <div id="hud-hint"></div>
      <div id="hud-toast"></div>
      <div id="hud-loopclock"></div>
      <div id="ship-hud"></div>
      <div id="scope-overlay" class="hidden">
        <div id="scope-ring"></div>
        <div id="scope-freq"></div>
        <div id="scope-signal"></div>
      </div>
      <div id="translate-overlay" class="hidden">
        <div id="translate-panel">
          <div id="translate-title">◈ 挪麦翻译机 ◈</div>
          <div id="translate-text"></div>
        </div>
      </div>
      <div id="damage-flash"></div>
      <div id="supernova-flash"></div>
    </div>

    <!-- 界面层：背包 / 日志 / 暂停 -->
    <div id="screens" class="ui-layer hidden"></div>
    <div id="drag-ghost" class="hidden"></div>
    <div id="tooltip" class="hidden"></div>

    <!-- 开始界面 -->
    <div id="title-screen">
      <div id="title-stars"></div>
      <div id="title-inner">
        <div id="title-logo">方块星野</div>
        <div id="title-sub">BLOCK WILDS · 我的世界 × 星际拓荒</div>
        <div id="title-tip">一个被困在时间循环里的方块太阳系</div>
        <button id="btn-start" class="mc-btn big">开始探索</button>
        <button id="btn-creative" class="mc-btn" style="margin-left:12px">创造模式</button>
        <div id="title-loading">正在生成太阳系……</div>
        <div id="title-controls">
          WASD 移动 · 空格 跳跃/喷气 · E 背包 · Q 日志 · F 交互 · 1-9 快捷栏<br>
          鼠标左键 挖掘 · 右键 放置/使用 · Shift 下降/潜行 · R 上飞船后起飞
        </div>
      </div>
    </div>
  </div>

  <script>
    window.__errLog = [];
    window.addEventListener('error', function(e) {
      window.__errLog.push((e.filename||'') + ':' + (e.lineno||0) + ' ' + e.message);
      var d = document.getElementById('err-log');
      if (d) d.textContent = window.__errLog.join('\n');
    });
  </script>
  <div id="err-log" style="display:none"></div>
  <script src="libs/three.min.js"></script>
  <script src="js/core/const.js"></script>
  <script src="js/core/util.js"></script>
  <script src="js/gfx/textures.js"></script>
  <script src="js/gfx/icons.js"></script>
  <script src="js/audio/audio.js"></script>
  <script src="js/audio/sfx.js"></script>
  <script src="js/audio/music.js"></script>
  <script src="js/world/planets.js"></script>
  <script src="js/world/chunks.js"></script>
  <script src="js/world/farlod.js"></script>
  <script src="js/game/inventory.js"></script>
  <script src="js/game/player.js"></script>
  <script src="js/game/ship.js"></script>
  <script src="js/game/hud.js"></script>
  <script src="js/game/screens.js"></script>
  <script src="js/game/gameplay.js"></script>
  <script src="js/game/main.js"></script>
</body>
</html>
