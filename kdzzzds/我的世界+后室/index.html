<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方块后室 BLOCKROOMS — 我的世界 × 后室</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23c8b665'/%3E%3Crect x='6' width='4' height='16' fill='%23b09c50'/%3E%3Crect y='13' width='16' height='3' fill='%238b7d46'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ 载入画面 ============ -->
<div id="loading">
  <div class="load-block">
    <svg viewBox="0 0 32 32" width="72" height="72" shape-rendering="crispEdges">
      <rect width="32" height="32" fill="#c8b665"/>
      <rect x="12" width="8" height="32" fill="#b09c50"/>
      <rect x="26" width="2" height="32" fill="#bfae5c"/>
      <rect y="26" width="32" height="6" fill="#8b7d46"/>
      <rect width="32" height="2" fill="#d6c576"/>
    </svg>
  </div>
  <div class="load-text">正在生成后室……</div>
</div>

<canvas id="game-canvas"></canvas>

<!-- ============ HUD ============ -->
<div id="hud" class="screen">
  <div id="crosshair">
    <svg viewBox="0 0 18 18" width="18" height="18" shape-rendering="crispEdges">
      <path d="M8 0h2v7H8zM8 11h2v7H8zM0 8h7v2H0zM11 8h7v2h-7z" fill="#fff"/>
    </svg>
  </div>
  <div id="objective"></div>
  <div id="level-title"></div>
  <div id="toasts"></div>
  <div id="hud-bottom">
    <div id="status-bars">
      <div id="hearts"></div>
      <div id="sanity"></div>
    </div>
    <div id="item-name"></div>
    <div id="hotbar"></div>
    <div id="hint"></div>
  </div>
</div>

<!-- ============ 覆盖特效层 ============ -->
<div id="vignette-sanity" class="overlay"></div>
<div id="vignette-damage" class="overlay"></div>
<div id="flash-red" class="overlay"></div>
<div id="glitch-overlay" class="overlay">
  <div class="g-bars"></div>
  <div class="g-bars g2"></div>
  <div class="g-scan"></div>
</div>
<div id="noclip-overlay">
  <div class="nc-bars"></div>
  <div class="nc-bars n2"></div>
  <div class="nc-text">NOCLIP<span>正在脱离现实……</span></div>
  <div class="nc-white"></div>
</div>

<!-- ============ 背包 / 合成 ============ -->
<div id="inventory-screen">
  <div class="inv-panel">
    <div class="inv-left">
      <div class="inv-header" id="inv-title">背包</div>
      <div class="inv-section-label">物品栏</div>
      <div id="inv-grid"></div>
      <div class="inv-section-label">快捷栏</div>
      <div id="inv-hotbar"></div>
      <div class="inv-tip">左键拿取/放下 · 右键取一半/放一个 · Shift+左键 快速移动 · E 关闭</div>
    </div>
    <div class="inv-right">
      <div class="inv-header">
        <svg viewBox="0 0 9 9" width="16" height="16" shape-rendering="crispEdges" style="vertical-align:-2px">
          <rect width="9" height="9" fill="#6e5631"/><rect x="1" y="1" width="7" height="7" fill="#c4a266"/>
          <rect x="4" y="1" width="1" height="7" fill="#6e5631"/><rect x="1" y="4" width="7" height="1" fill="#6e5631"/>
        </svg>
        合成
      </div>
      <div id="recipe-list"></div>
    </div>
  </div>
</div>
<div id="cursor-item"><div class="slot-inner"></div><span class="slot-count"></span></div>
<div id="tooltip"></div>

<!-- ============ 主菜单 ============ -->
<div id="menu-main" class="screen">
  <div class="menu-dim"></div>
  <div class="menu-content">
    <div class="logo-wrap">
      <h1 class="logo" data-text="方块后室">方块后室</h1>
      <div class="logo-sub">B L O C K R O O M S</div>
      <div id="splash" class="splash">别眨眼。</div>
    </div>
    <div class="menu-buttons">
      <button id="btn-start" class="mc-btn big">开 始 游 戏</button>
      <button id="btn-settings" class="mc-btn">设 置</button>
      <button id="btn-fullscreen" class="mc-btn">全 屏</button>
    </div>
    <div id="menu-deco"></div>
    <div class="menu-footer">
      <span>我的世界 × 后室 · 玩法融合网页游戏</span>
      <span>WASD 移动 · 鼠标 视角 · 左键 破坏 · 右键 放置/交互</span>
    </div>
  </div>
</div>

<!-- ============ 设置 ============ -->
<div id="menu-settings" class="screen">
  <div class="menu-dim"></div>
  <div class="panel-box">
    <div class="panel-title">设 置</div>
    <div class="set-row"><label>音效音量</label><input type="range" id="set-volume" min="0" max="1" step="0.05"><span id="set-volume-v"></span></div>
    <div class="set-row"><label>音乐音量</label><input type="range" id="set-music" min="0" max="1" step="0.05"><span id="set-music-v"></span></div>
    <div class="set-row"><label>鼠标灵敏度</label><input type="range" id="set-sens" min="0.2" max="2.5" step="0.1"><span id="set-sens-v"></span></div>
    <div class="set-row"><label>视野 FOV</label><input type="range" id="set-fov" min="60" max="100" step="1"><span id="set-fov-v"></span></div>
    <div class="set-row"><label>渲染距离</label><input type="range" id="set-dist" min="2" max="5" step="1"><span id="set-dist-v"></span></div>
    <button id="btn-settings-back" class="mc-btn">完 成</button>
  </div>
</div>

<!-- ============ 暂停 ============ -->
<div id="menu-pause" class="screen">
  <div class="menu-dim dark"></div>
  <div class="panel-box">
    <div class="panel-title">游戏暂停</div>
    <button id="btn-resume" class="mc-btn big">回到游戏</button>
    <button id="btn-pause-settings" class="mc-btn">设 置</button>
    <button id="btn-quit" class="mc-btn">保存并退出到主菜单</button>
  </div>
</div>

<!-- ============ 死亡 ============ -->
<div id="screen-death" class="screen">
  <div class="death-dim"></div>
  <div class="panel-center">
    <h1 class="death-title">你死了！</h1>
    <div id="death-reason" class="death-reason"></div>
    <button id="btn-respawn" class="mc-btn big">重  生</button>
    <button id="btn-death-quit" class="mc-btn">主 菜 单</button>
  </div>
</div>

<!-- ============ 胜利 ============ -->
<div id="screen-win" class="screen">
  <div class="menu-dim dark"></div>
  <div class="panel-center">
    <div class="win-exit">
      <svg viewBox="0 0 26 14" width="220" height="118" shape-rendering="crispEdges">
        <rect width="26" height="14" fill="#0b3d20"/>
        <rect x="1" y="1" width="24" height="12" fill="#0f5c2e"/>
        <rect x="1" y="1" width="24" height="1" fill="#1c7d44"/>
        <g fill="#b6ffd2">
          <path d="M3 4h3v1H4v1h2v1H4v1h2v1H3zM7 4h1v2h1V4h1v2h-1v1h1v2H9V7H8v2H7V7h1V6H7zM11 4h3v1h-1v4h-1V5h-1zM15 4h3v1h-1v4h-1V5h-1z" transform="translate(2,1)"/>
        </g>
      </svg>
    </div>
    <h1 class="win-title">你推开了大门</h1>
    <div class="win-sub">刺眼的白光涌了进来…… 但后室真的有出口吗？</div>
    <div id="win-stats"></div>
    <button id="btn-continue" class="mc-btn big">继续探索（无尽模式）</button>
    <button id="btn-win-quit" class="mc-btn">回到主菜单</button>
  </div>
</div>

<!-- ============ 开场字幕 ============ -->
<div id="screen-intro" class="screen">
  <div id="intro-text"></div>
  <button id="intro-skip">跳过 ›</button>
</div>

<div id="fade-overlay"></div>

<script src="lib/three.min.js"></script>
<script src="js/assets.js"></script>
<script src="js/audio.js"></script>
<script src="js/blocks.js"></script>
<script src="js/worldgen.js"></script>
<script src="js/world.js"></script>
<script src="js/player.js"></script>
<script src="js/entities.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
