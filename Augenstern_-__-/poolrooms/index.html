<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POOLROOMS · 池核空间</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #cv { position: fixed; inset: 0; display: block; }
  #enter {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #10181a 0%, #04070a 80%);
    color: #cfe6ea; cursor: pointer; opacity: 0; transition: opacity 1.2s;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; user-select: none;
  }
  #enter.ready { opacity: 1; }
  #enter .t1 { font-size: 30px; letter-spacing: 18px; font-weight: 300; text-indent: 18px; }
  #enter .t2 { font-size: 11px; letter-spacing: 6px; margin-top: 16px; color: #5f7a80; }
  #enter .t3 { font-size: 11px; letter-spacing: 3px; margin-top: 60px; color: #44585d; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="enter">
  <div class="t1">POOLROOMS</div>
  <div class="t2">点 击 进 入</div>
  <div class="t3">WASD 移动 · Shift 疾跑 · Space 跳跃 · 鼠标 视角 · Esc 释放鼠标</div>
</div>
<script src="js/three.min.js"></script>
<script src="js/textures.js"></script>
<script src="js/world.js"></script>
<script src="js/water.js"></script>
<script src="js/post.js"></script>
<script src="js/player.js"></script>
<script src="js/audio.js"></script>
<script src="js/main.js"></script>
</body>
</html>
