<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逆转法庭 ～午夜的钟声～ | NDS风格网页游戏</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body {
  background:radial-gradient(ellipse at 50% 30%, #2a2a3e 0%, #14141e 60%, #0a0a10 100%);
  display:flex; justify-content:center; align-items:center;
  min-height:100vh; font-family:'SimHei','Microsoft YaHei',sans-serif;
  overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
}
#shell-wrap { transform-origin:center center; }
#nds-shell {
  position:relative; display:flex; flex-direction:column; align-items:center;
  background:linear-gradient(160deg,#f2f2f4 0%,#d8d8dc 40%,#c9c9ce 70%,#dedee2 100%);
  border-radius:22px; padding:20px 22px 16px;
  box-shadow: 0 0 0 2px #b8b8bc, 0 0 0 4px #8a8a90, 0 14px 44px rgba(0,0,0,.65),
    inset 0 2px 2px rgba(255,255,255,.6), inset 0 -3px 6px rgba(0,0,0,.12);
}
#nds-shell::before {
  content:''; position:absolute; top:9px; left:50%; transform:translateX(-50%);
  width:150px; height:5px; background:linear-gradient(#9a9aa0,#c5c5ca);
  border-radius:3px;
}
.power-led {
  position:absolute; top:26px; left:14px; width:7px; height:7px; border-radius:50%;
  background:#3f6; box-shadow:0 0 6px #3f6, 0 0 12px rgba(51,255,102,.5);
}
.screen-frame {
  position:relative; background:linear-gradient(#17171b,#0c0c10);
  border-radius:9px; padding:11px;
  box-shadow: inset 0 0 14px rgba(0,0,0,.95), inset 0 1px 0 rgba(255,255,255,.06);
  margin:5px 0;
}
.screen-inner { position:relative; line-height:0; }
canvas.gamescreen {
  display:block; image-rendering:pixelated; image-rendering:crisp-edges;
  background:#000; border-radius:2px;
}
.lcd {
  position:absolute; inset:0; pointer-events:none; z-index:8; border-radius:2px;
  background-image:
    linear-gradient(rgba(0,0,0,.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,60,60,.03), rgba(60,255,60,.03), rgba(60,60,255,.03));
  background-size: 3px 3px, 3px 3px, 9px 100%;
  display:none;
}
.lcd::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 30% 12%, rgba(255,255,255,.09) 0%, transparent 55%);
}
.lcd.on { display:block; }
#hinge {
  width:100%; height:14px; margin:2px 0;
  background:linear-gradient(#b9b9be,#97979d 45%,#c9c9ce);
  border-radius:7px; box-shadow: inset 0 1px 2px rgba(0,0,0,.3);
}
#deco-row {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:6px 6px 0;
}
.dpad { position:relative; width:58px; height:58px; }
.dpad::before, .dpad::after {
  content:''; position:absolute; background:linear-gradient(#3c3c42,#26262c);
  border-radius:4px; box-shadow:0 1px 2px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
}
.dpad::before { left:19px; top:0; width:20px; height:58px; }
.dpad::after { left:0; top:19px; width:58px; height:20px; }
.abxy { position:relative; width:62px; height:62px; }
.abxy span {
  position:absolute; width:22px; height:22px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #4a4a52, #26262c);
  box-shadow:0 1px 3px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.15);
  color:#8f8f96; font-size:10px; font-weight:bold; text-align:center; line-height:22px;
}
.abxy .bx { left:20px; top:0; } .abxy .bb { left:20px; bottom:0; }
.abxy .by { left:0; top:20px; } .abxy .ba { right:0; top:20px; }
.speaker { display:flex; gap:8px; flex-direction:column; align-items:center; }
.speaker i { display:block; width:26px; height:3px; background:#55555c; border-radius:2px;
  box-shadow:inset 0 1px 1px rgba(0,0,0,.6); }
#hint-bar {
  margin-top:8px; color:#6a6a72; font-size:11px; letter-spacing:1px; text-align:center;
}
.shakeX { animation:shakeX .38s linear; }
@keyframes shakeX {
  0%,100%{transform:translate(0,0)} 12%{transform:translate(-5px,2px)}
  25%{transform:translate(5px,-2px)} 37%{transform:translate(-4px,-1px)}
  50%{transform:translate(4px,2px)} 63%{transform:translate(-3px,0)}
  75%{transform:translate(3px,1px)} 87%{transform:translate(-2px,0)}
}
</style>
</head>
<body>
<div id="shell-wrap">
<div id="nds-shell">
  <div class="power-led"></div>
  <div class="screen-frame">
    <div class="screen-inner" id="topWrap">
      <canvas id="cvTop" class="gamescreen" width="256" height="192"></canvas>
      <div class="lcd on" id="lcdTop"></div>
    </div>
  </div>
  <div id="hinge"></div>
  <div id="deco-row" style="width:auto; align-self:stretch;">
    <div class="dpad"></div>
    <div class="screen-frame" style="margin:0 10px;">
      <div class="screen-inner" id="btmWrap">
        <canvas id="cvBtm" class="gamescreen" width="256" height="192"></canvas>
        <div class="lcd on" id="lcdBtm"></div>
      </div>
    </div>
    <div class="abxy"><span class="bx">X</span><span class="by">Y</span><span class="ba">A</span><span class="bb">B</span></div>
  </div>
  <div style="display:flex; align-items:center; gap:30px; margin-top:6px;">
    <div class="speaker"><i></i><i></i><i></i></div>
    <div id="hint-bar">A/空格·确认 &nbsp; ←→·选择 &nbsp; B/Esc·返回 &nbsp; R·证物 &nbsp; F·液晶滤镜</div>
    <div class="speaker"><i></i><i></i><i></i></div>
  </div>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
