<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-plane V8 · Equal-Length Headers · Sound Sim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c12;color:#c2c6d4;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none;padding:20px}
h1{font-size:1.05rem;font-weight:500;letter-spacing:0.15em;color:#8093ad;margin-bottom:14px;text-transform:uppercase}
.panel{background:#10131c;border:1px solid #1e2432;border-radius:12px;padding:18px 24px;margin-bottom:14px;width:640px}
.tach{display:flex;align-items:baseline;gap:10px;justify-content:center;margin-bottom:10px}
.tach .rpm{font-size:3.2rem;font-weight:700;font-family:'Consolas',monospace;color:#e6e9f2;min-width:230px;text-align:right}
.tach .unit{font-size:0.8rem;color:#5a6a80}
.bar{height:14px;background:#171b28;border-radius:7px;overflow:hidden;position:relative}
.bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#2e6fd0,#3fae6a 45%,#d8a832 70%,#e8553a 88%);transition:width 0.05s linear;border-radius:7px}
.bar .redline{position:absolute;top:0;bottom:0;width:2px;background:#ff4433;left:91%}
.row{display:flex;gap:20px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:14px}
.cg{display:flex;flex-direction:column;align-items:center;gap:4px}
.cg label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:#5a6a80}
.cg input[type=range]{width:130px;appearance:none;height:4px;background:#1e2432;border-radius:2px;cursor:pointer}
.cg input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:#e8553a;cursor:pointer;border:none}
.cg .val{font-size:0.72rem;font-family:'Consolas',monospace;color:#c8ccda}
.btn{background:#1a2130;color:#a8b4c6;border:1px solid #2c3648;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.12s}
.btn:hover{background:#243050;border-color:#48608a}
.btn.on{background:#33150f;border-color:#d04830;color:#ff8f70;box-shadow:0 0 12px rgba(208,72,48,0.25)}
.btn.scene.active{background:#152a3a;border-color:#3a80b0;color:#7fc4ee}
.throttle-wrap{width:100%;margin-top:14px}
.throttle-wrap label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:#5a6a80;display:block;text-align:center;margin-bottom:5px}
.throttle-wrap input{width:100%;appearance:none;height:8px;background:#1e2432;border-radius:4px;cursor:pointer}
.throttle-wrap input::-webkit-slider-thumb{appearance:none;width:24px;height:24px;border-radius:50%;background:#3fae6a;cursor:pointer;border:none}
.hint{font-size:0.68rem;color:#4a5568;text-align:center;margin-top:10px}
.scenes{display:flex;gap:10px;justify-content:center}
</style>
</head>
<body>
<h1>前中置 V8 · 十字曲轴 · 等长芭蕉</h1>

<div class="panel">
  <div class="tach"><span class="rpm" id="rpmText">0</span><span class="unit">RPM</span></div>
  <div class="bar"><div class="fill" id="rpmBar"></div><div class="redline"></div></div>
  <div class="throttle-wrap">
    <label>Throttle（按住 W 全油门 / 拖动滑块）</label>
    <input type="range" id="throttle" min="0" max="100" value="0" step="1">
  </div>
  <div class="row">
    <button class="btn" id="startBtn">Start Engine</button>
  </div>
</div>

<div class="panel" style="padding:12px">
  <canvas id="viz" width="592" height="330" style="display:block;width:100%;border-radius:8px"></canvas>
</div>

<div class="panel">
  <div class="scenes">
    <button class="btn scene active" data-scene="exterior">车外</button>
    <button class="btn scene" data-scene="cockpit">车内</button>
    <button class="btn scene" data-scene="tunnel">隧道</button>
    <button class="btn scene" data-scene="garage">车库</button>
  </div>
  <div class="row">
    <div class="cg"><label>芭蕉长度 (m)</label><input type="range" id="headerLen" min="0.4" max="1.5" value="0.85" step="0.01"><span class="val" id="headerVal">0.85</span></div>
    <div class="cg"><label>尾段长度 (m)</label><input type="range" id="tailLen" min="0.6" max="3.2" value="1.7" step="0.05"><span class="val" id="tailVal">1.70</span></div>
    <div class="cg"><label>X-Pipe 耦合</label><input type="range" id="crossMix" min="0" max="50" value="12" step="1"><span class="val" id="crossVal">0.12</span></div>
    <div class="cg"><label>增压器</label><input type="range" id="blower" min="0" max="100" value="70" step="1"><span class="val" id="blowerVal">70%</span></div>
    <div class="cg"><label>音量</label><input type="range" id="volume" min="0" max="100" value="60" step="1"><span class="val" id="volVal">60%</span></div>
  </div>
  <div class="hint">十字曲轴单侧排气脉冲间隔 270-180-90-180°，等长芭蕉保留清晰的 burble 节奏</div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
