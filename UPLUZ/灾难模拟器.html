<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const rand=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>(a+Math.random()*(b-a+1))|0;
const pick=a=>a[(Math.random()*a.length)|0];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,k)=>a+(b-a)*k;

const elLoad=document.getElementById('load'),elStats=document.getElementById('stats'),elHint=document.getElementById('hint'),elFlash=document.getElementById('flash');
const elPower=document.getElementById('power'),elBlur=document.getElementById('blur');
const POW=()=>parseFloat(elPower.value);
const HINT_DEF='👉 点击地图释放灾难 · WASD/方向键移动 · 再点按钮提前结束';

const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.8));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const FOG_DAY=new THREE.Color(0xcfe8ff),FOG_STORM=new THREE.Color(0x555f6e);
scene.fog=new THREE.Fog(FOG_DAY.clone(),180,460);

const camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,.1,1200);
camera.position.set(66,60,66);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,5,0);
controls.enableDamping=true;controls.dampingFactor=.08;
controls.minDistance=24;controls.maxDistance=200;
controls.maxPolarAngle=1.24;

const sun=new THREE.DirectionalLight(0xfff2dc,2.7);
sun.position.set(75,115,55);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-125;sun.shadow.camera.right=125;
sun.shadow.camera.top=125;sun.shadow.camera.bottom=-125;
sun.shadow.camera.near=10;sun.shadow.camera.far=340;
sun.shadow.bias=-.0005;sun.shadow.normalBias=.6;
scene.add(sun);
const rim=new THREE.DirectionalLight(0xbcd9ff,.55);rim.position.set(-70,45,-85);scene.add(rim);
const hemi=new THREE.HemisphereLight(0xcfe8ff,0xf7d9b0,.95);scene.add(hemi);

const SKY_DAY={top:new THREE.Color(0x53b5ff),mid:new THREE.Color(0xaee2ff),bot:new THREE.Color(0xffedd0)};
const SKY_STORM={top:new THREE.Color(0x2c3a55),mid:new THREE.Color(0x53637d),bot:new THREE.Color(0x77808f)};
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,fog:false,
 uniforms:{cTop:{value:SKY_DAY.top.clone()},cMid:{value:SKY_DAY.mid.clone()},cBot:{value:SKY_DAY.bot.clone()}},
 vertexShader:'varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
 fragmentShader:'uniform vec3 cTop;uniform vec3 cMid;uniform vec3 cBot;varying vec3 vP;void main(){float h=normalize(vP).y;vec3 c=h<0.12?mix(cBot,cMid,smoothstep(-0.18,0.12,h)):mix(cMid,cTop,smoothstep(0.12,0.75,h));gl_FragColor=vec4(c,1.0);}'});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(560,32,16),skyMat));

const cloudMat=new THREE.MeshLambertMaterial({color:0xffffff});
const clouds=[];
{
 const puff=new THREE.SphereGeometry(1,10,8);
 for(let i=0;i<9;i++){
  const g=new THREE.Group();
  const n=ri(3,5);
  for(let j=0;j<n;j++){
   const m=new THREE.Mesh(puff,cloudMat);
   const s=rand(4,9);
   m.scale.set(s,s*.42,s*.8);
   m.position.set(rand(-7,7),rand(-1,1.5),rand(-4,4));
   g.add(m);
  }
  g.position.set(rand(-170,170),rand(46,72),rand(-170,170));
  g.userData.spd=rand(1.2,2.6);
  scene.add(g);clouds.push(g);
 }
}

const cityGroup=new THREE.Group();scene.add(cityGroup);

const GRID=6,BLOCK=20,ROAD=6,CELL=BLOCK+ROAD,ORIG=-(GRID*CELL-ROAD)/2;
const SC=130000,DC=18000;

const vX=new Int16Array(SC),vY=new Int16Array(SC),vZ=new Int16Array(SC);
const vR=new Float32Array(SC),vG=new Float32Array(SC),vB=new Float32Array(SC);
const vStruct=new Int32Array(SC),vAlive=new Uint8Array(SC);
const mark=new Int32Array(SC);
let vCount=0,aliveVox=0,stamp=0,matDirty=false,colDirty=false;
const map=new Map();
const structSlots=[];const dirtyStructs=new Set();const pending=[];
const K=(x,y,z)=>((x+160)*512+(z+160))*512+y;
const newStruct=()=>{structSlots.push([]);return structSlots.length-1;};

const dummy=new THREE.Object3D();
const zeroM=new THREE.Matrix4().makeScale(0,0,0);
const boxGeo=new THREE.BoxGeometry(1,1,1);
const staticMat=new THREE.MeshStandardMaterial({roughness:.88,metalness:0});
const staticMesh=new THREE.InstancedMesh(boxGeo,staticMat,SC);
staticMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
staticMesh.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(SC*3),3);
staticMesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
staticMesh.castShadow=true;staticMesh.receiveShadow=true;staticMesh.frustumCulled=false;
cityGroup.add(staticMesh);

const debrisMat=new THREE.MeshStandardMaterial({roughness:.9,metalness:0});
const debrisMesh=new THREE.InstancedMesh(boxGeo,debrisMat,DC);
debrisMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
debrisMesh.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(DC*3),3);
debrisMesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
debrisMesh.castShadow=true;debrisMesh.receiveShadow=true;debrisMesh.frustumCulled=false;
scene.add(debrisMesh);

const dX=new Float32Array(DC),dY=new Float32Array(DC),dZ=new Float32Array(DC);
const dVX=new Float32Array(DC),dVY=new Float32Array(DC),dVZ=new Float32Array(DC);
const dRX=new Float32Array(DC),dRY=new Float32Array(DC),dRZ=new Float32Array(DC);
const dWX=new Float32Array(DC),dWY=new Float32Array(DC),dWZ=new Float32Array(DC);
const dS=new Float32Array(DC),dCR=new Float32Array(DC),dCG=new Float32Array(DC),dCB=new Float32Array(DC);
const dRest=new Float32Array(DC),dFade=new Uint8Array(DC),dSleep=new Float32Array(DC);
let dCount=0;

function addVoxel(x,y,z,c,st){
 if(vCount>=SC)return -1;
 const kk=K(x,y,z);
 if(map.has(kk))return -1;
 const s=vCount++;
 const shade=(0.86+0.14*Math.min(1,y/12))*rand(.94,1.06);
 vX[s]=x;vY[s]=y;vZ[s]=z;
 vR[s]=Math.min(1,c.r*shade);vG[s]=Math.min(1,c.g*shade);vB[s]=Math.min(1,c.b*shade);
 vStruct[s]=st;vAlive[s]=1;aliveVox++;
 map.set(kk,s);structSlots[st].push(s);
 staticMesh.instanceColor.setXYZ(s,vR[s],vG[s],vB[s]);
 dummy.position.set(x+.5,y+.5,z+.5);dummy.rotation.set(0,0,0);dummy.scale.set(1,1,1);dummy.updateMatrix();
 staticMesh.setMatrixAt(s,dummy.matrix);
 return s;
}
function spawnDebris(x,y,z,vx,vy,vz,r,g,b,size){
 if(dCount>=DC)return;
 const i=dCount++;
 dX[i]=x;dY[i]=y;dZ[i]=z;dVX[i]=vx;dVY[i]=vy;dVZ[i]=vz;
 dRX[i]=rand(0,3);dRY[i]=rand(0,3);dRZ[i]=rand(0,3);
 dWX[i]=rand(-7,7);dWY[i]=rand(-7,7);dWZ[i]=rand(-7,7);
 dS[i]=size||rand(.85,1);dCR[i]=r;dCG[i]=g;dCB[i]=b;
 dRest[i]=0;dFade[i]=0;dSleep[i]=rand(2.5,6.5);
}
function freeDebris(i){
 const l=--dCount;
 if(i!==l){
  dX[i]=dX[l];dY[i]=dY[l];dZ[i]=dZ[l];dVX[i]=dVX[l];dVY[i]=dVY[l];dVZ[i]=dVZ[l];
  dRX[i]=dRX[l];dRY[i]=dRY[l];dRZ[i]=dRZ[l];dWX[i]=dWX[l];dWY[i]=dWY[l];dWZ[i]=dWZ[l];
  dS[i]=dS[l];dCR[i]=dCR[l];dCG[i]=dCG[l];dCB[i]=dCB[l];
  dRest[i]=dRest[l];dFade[i]=dFade[l];dSleep[i]=dSleep[l];
 }
}
const chunks=[];
const _cv=new THREE.Vector3(),_cq=new THREE.Quaternion();
function makeChunk(slots,tip0){
 const n=slots.length;
 let minX=1e9,minY=1e9,minZ=1e9,maxX=-1e9,maxZ=-1e9,ccx=0,ccz=0;
 for(const s of slots){
  const x=vX[s],y=vY[s],z=vZ[s];
  if(x<minX)minX=x;if(x>maxX)maxX=x;
  if(z<minZ)minZ=z;if(z>maxZ)maxZ=z;
  if(y<minY)minY=y;
  ccx+=x+.5;ccz+=z+.5;
 }
 ccx/=n;ccz/=n;
 let dx=tip0?tip0.x:rand(-1,1),dz=tip0?tip0.z:rand(-1,1);
 const dl=Math.hypot(dx,dz)||1;
 dx/=dl;dz/=dl;
 const tip=minY<=1;
 const px=tip?clamp(ccx+dx*((maxX-minX)*.5+.5),minX,maxX+1):ccx;
 const pz=tip?clamp(ccz+dz*((maxZ-minZ)*.5+.5),minZ,maxZ+1):ccz;
 const pivot=new THREE.Vector3(px,minY,pz);
 const mesh=new THREE.InstancedMesh(boxGeo,staticMat,n);
 mesh.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(n*3),3);
 const rel=new Float32Array(n*3);
 let maxTip=1,maxH=1;
 for(let i=0;i<n;i++){
  const s=slots[i];
  const rx=vX[s]+.5-px,ry=vY[s]+.5-minY,rz=vZ[s]+.5-pz;
  rel[i*3]=rx;rel[i*3+1]=ry;rel[i*3+2]=rz;
  dummy.position.set(rx,ry,rz);dummy.rotation.set(0,0,0);dummy.scale.set(1,1,1);dummy.updateMatrix();
  mesh.setMatrixAt(i,dummy.matrix);
  mesh.instanceColor.setXYZ(i,vR[s],vG[s],vB[s]);
  const tp=rx*dx+rz*dz;
  if(tp>maxTip)maxTip=tp;
  if(ry>maxH)maxH=ry;
  vAlive[s]=0;aliveVox--;
  map.delete(K(vX[s],vY[s],vZ[s]));
  staticMesh.setMatrixAt(s,zeroM);
 }
 matDirty=true;
 mesh.castShadow=true;mesh.receiveShadow=true;mesh.frustumCulled=false;
 mesh.position.copy(pivot);
 scene.add(mesh);
 const axis=tip?new THREE.Vector3(0,1,0).cross(new THREE.Vector3(dx,0,dz)).normalize():new THREE.Vector3(rand(-1,1),rand(-.3,.3),rand(-1,1)).normalize();
 chunks.push({mesh,rel,n,pivot,dx,dz,axis,tip,theta:0,omega:tip?rand(.06,.16):rand(-.6,.6),vy:tip?0:-2,maxTip,maxH,crumb:0});
 SFX.blast(.55,.5,260,60);
}
function shatterChunk(c){
 _cq.copy(c.mesh.quaternion);
 const wx=c.axis.x*c.omega,wy=c.axis.y*c.omega,wz=c.axis.z*c.omega;
 const colA=c.mesh.instanceColor.array;
 for(let i=0;i<c.n;i++){
  _cv.set(c.rel[i*3],c.rel[i*3+1],c.rel[i*3+2]).applyQuaternion(_cq);
  const x=_cv.x+c.pivot.x,y=_cv.y+c.pivot.y,z=_cv.z+c.pivot.z;
  if(dCount>=DC-2){if(Math.random()<.06)fxDust(x,Math.max(.5,y),z,1);continue;}
  spawnDebris(x,Math.max(.5,y),z,
   (wy*_cv.z-wz*_cv.y)+rand(-3,3),
   (wz*_cv.x-wx*_cv.z)+c.vy*.5+rand(0,4),
   (wx*_cv.y-wy*_cv.x)+rand(-3,3),
   colA[i*3],colA[i*3+1],colA[i*3+2],rand(.85,1));
 }
 const nd=Math.min(30,c.n>>4);
 for(let i=0;i<nd;i++)fxDust(c.pivot.x+c.dx*rand(0,c.maxH*.8)+rand(-4,4),rand(.5,2.5),c.pivot.z+c.dz*rand(0,c.maxH*.8)+rand(-4,4),2);
 shakeAmp+=clamp(.3+c.n*.0035,.3,1.5);
 SFX.blast(clamp(.6+c.n*.0012,.6,1.5),1,300,36);
 scene.remove(c.mesh);
 c.mesh.dispose();
}
function updateChunks(dt){
 for(let i=chunks.length-1;i>=0;i--){
  const c=chunks[i];
  if(c.tip){
   c.omega+=3.4*dt*(.5+Math.sin(Math.min(c.theta+.2,1.5)));
   c.theta+=c.omega*dt;
   c.crumb+=dt;
   if(c.crumb>.12){c.crumb=0;fxDust(c.pivot.x+rand(-2,2),.6,c.pivot.z+rand(-2,2),1);}
   c.pivot.y=Math.max(-.5,c.pivot.y-.9*dt);
   _cq.setFromAxisAngle(c.axis,c.theta);
   _cv.set(c.dx*c.maxTip*.2,c.maxH,c.dz*c.maxTip*.2).applyQuaternion(_cq);
   if(c.theta>1.6||_cv.y+c.pivot.y<Math.min(3,c.maxH*.25)){shatterChunk(c);chunks.splice(i,1);continue;}
  }else{
   c.vy-=36*dt;
   c.pivot.y+=c.vy*dt;
   c.theta+=c.omega*dt;
   _cq.setFromAxisAngle(c.axis,c.theta);
   if(c.pivot.y<=.3){shatterChunk(c);chunks.splice(i,1);continue;}
  }
  c.mesh.position.copy(c.pivot);
  c.mesh.quaternion.copy(_cq);
 }
}
function destroyVoxel(s,vx,vy,vz,spawn=true){
 if(!vAlive[s])return;
 vAlive[s]=0;aliveVox--;
 map.delete(K(vX[s],vY[s],vZ[s]));
 staticMesh.setMatrixAt(s,zeroM);matDirty=true;
 dirtyStructs.add(vStruct[s]);
 if(spawn&&dCount<DC-30)spawnDebris(vX[s]+.5,vY[s]+.5,vZ[s]+.5,vx,vy,vz,vR[s],vG[s],vB[s],rand(.85,1));
 else if(Math.random()<.15)fxDust(vX[s]+.5,vY[s]+.5,vZ[s]+.5,1);
}
function charVoxel(s){
 if(!vAlive[s])return;
 vR[s]=vR[s]*.28+.02;vG[s]=vG[s]*.26+.02;vB[s]=vB[s]*.24+.02;
 staticMesh.instanceColor.setXYZ(s,vR[s],vG[s],vB[s]);colDirty=true;
}
const BUDGET=6;
const bud=new Int8Array(SC);
function checkStruct(id){
 const list=structSlots[id];if(!list||!list.length)return;
 stamp++;
 const q=[];
 for(let i=0;i<list.length;i++){const s=list[i];if(vAlive[s]&&vY[s]===0){mark[s]=stamp;bud[s]=BUDGET;q.push(s);}}
 let qi=0;
 const relax=(x,y,z,nb)=>{
  const n=map.get(K(x,y,z));
  if(n!==undefined&&vAlive[n]&&vStruct[n]===id&&(mark[n]!==stamp||bud[n]<nb)){mark[n]=stamp;bud[n]=nb;q.push(n);}
 };
 while(qi<q.length){
  const s=q[qi++];
  const b=bud[s],x=vX[s],y=vY[s],z=vZ[s];
  relax(x,y+1,z,b);relax(x,y-1,z,b);
  if(b>0){relax(x+1,y,z,b-1);relax(x-1,y,z,b-1);relax(x,y,z+1,b-1);relax(x,y,z-1,b-1);}
 }
 const U=[];
 let supX=0,supZ=0,supN=0;
 for(let i=0;i<list.length;i++){
  const s=list[i];
  if(!vAlive[s])continue;
  if(mark[s]===stamp){supX+=vX[s];supZ+=vZ[s];supN++;}
  else U.push(s);
 }
 if(!U.length)return;
 if(U.length<40){
  for(const s of U)pending.push({s,t:vY[s]*.03*rand(.4,1)+rand(0,.06)});
  return;
 }
 const km=new Map();
 for(const s of U)km.set(K(vX[s],vY[s],vZ[s]),s);
 const seen=new Set();
 for(const s0 of U){
  if(seen.has(s0))continue;
  const cl=[s0];seen.add(s0);
  let ci=0,ccx=0,ccz=0;
  while(ci<cl.length){
   const s=cl[ci++];
   ccx+=vX[s];ccz+=vZ[s];
   const x=vX[s],y=vY[s],z=vZ[s];
   let n;

function addBuilding(lx,lz,w,d,h){

 const doorX=lx+1+ri(0,Math.max(0,w-4));
 for(let y=0;y<h;y++){
  const slab=y>0&&y%3===0&&y<h-1;
  for(let ix=0;ix<w;ix++)for(let iz=0;iz<d;iz++){
   const x=lx+ix,z=lz+iz;
   const per=ix===0||iz===0||ix===w-1||iz===d-1;
   if(y===h-1){addVoxel(x,y,z,roof,st);continue;}
   if(per){
    if(y<2&&iz===0&&(x===doorX||x===doorX+1)){addVoxel(x,y,z,C_DOOR,st);continue;}
    const idx=(ix===0||ix===w-1)?iz:ix;
    const win=y%3!==0&&idx%3!==0;
    addVoxel(x,y,z,win?C_WIN:wall,st);
   }else if(slab)addVoxel(x,y,z,C_FLOOR,st);
  }
 }
 for(let ix=0;ix<w;ix++)for(let iz=0;iz<d;iz++){
  if(ix===0||iz===0||ix===w-1||iz===d-1)addVoxel(lx+ix,h,lz+iz,para,st);
 }
 if(Math.random()<.24&&w>4&&d>4){
  const tx=lx+ri(1,w-3),tz=lz+ri(1,d-3);
  for(let a=0;a<2;a++)for(let b=0;b<2;b++)for(let y=h;y<h+2;y++)addVoxel(tx+a,y,tz+b,C_TANK,st);
 }
 if(Math.random()<.2){
  const ax=lx+ri(1,w-2),az=lz+ri(1,d-2),ah=ri(2,4);
  for(let y=h;y<h+ah;y++)addVoxel(ax,y,az,C_ANT,st);

function nukeUpdate(dt){
 if(!nuke.on)return;
 if(nuke.bomb){
  nuke.bomb.position.y-=64*dt;
  nuke.bomb.rotation.y+=dt*3;
  nuke.bomb.rotation.z=Math.sin(T*2)*.08;
  if(nuke.bomb.position.y<=2)nukeDetonate();
  return;
 }
 const Rmax=nuke.Rmax;
 if(nuke.front<Rmax){
  const prev=nuke.front;
  nuke.front=Math.min(Rmax,nuke.front+(Rmax/2.4)*dt);
  const f2=nuke.front*nuke.front,p2=prev*prev;
  for(let s=0;s<vCount;s++){
   if(!vAlive[s])continue;
   const dx=vX[s]+.5-nuke.x,dy=vY[s]+.5,dz=vZ[s]+.5-nuke.z;
   const d2=dx*dx+dy*dy+dz*dz;
   if(d2>=f2||d2<p2)continue;
   const d=Math.sqrt(d2),fall=1-d/Rmax;
   if(Math.random()<.55+fall*.45){
    if(dCount<DC-40&&Math.random()<.42){
     const inv=1/(d+.6),sp=22+58*fall;
     destroyVoxel(s,dx*inv*sp+rand(-4,4),Math.abs(dy*inv)*sp*.5+7+30*fall,dz*inv*sp+rand(-4,4));
    }else destroyVoxel(s,0,0,0,false);
   }else charVoxel(s);
  }
  for(let i=0;i<dCount;i++){
   const dx=dX[i]-nuke.x,dz=dZ[i]-nuke.z;
   const d=Math.hypot(dx,dz);
   if(Math.abs(d-nuke.front)<5){
    const inv=1/(d+.5),fall=1-d/Rmax;
    dVX[i]+=dx*inv*130*fall*dt;
    dVY[i]+=52*fall*dt;
    dVZ[i]+=dz*inv*130*fall*dt;
    dRest[i]=0;dFade[i]=0;
   }
  }
  for(const p of peds){
   if(!p.alive)continue;
   const dx=p.x-nuke.x,dz=p.z-nuke.z;
   const d=Math.hypot(dx,dz);
   if(d<nuke.front){const inv=1/(d+.5);killPed(p,dx*inv*40,16,dz*inv*40);}
  }
  for(const c of dcars){
   if(!c.alive)continue;
   const[cx2,cz2]=carXZ(c);
   const dx=cx2-nuke.x,dz=cz2-nuke.z;
   const d=Math.hypot(dx,dz);
   if(d<nuke.front){const inv=1/(d+.5);killCar(c,dx*inv*44,18,dz*inv*44);}
  }
  for(let i=0;i<12;i++){
   const a=rand(0,6.28);
   fxDust(nuke.x+Math.cos(a)*nuke.front,rand(.5,3),nuke.z+Math.sin(a)*nuke.front,1);
  }
  shakeAmp=Math.max(shakeAmp,1.2*(1-nuke.front/Rmax)+.3);
 }
 nuke.cloudT+=dt;
 const ct=nuke.cloudT;
 if(ct<6.5){
  const fl=.7+.3*Math.sin(T*37+Math.sin(T*19)*2.5);
  nukeGlow.visible=true;
  nukeGlow.position.set(nuke.x,7+Math.min(ct,5)*4,nuke.z);
  nukeGlow.scale.setScalar((10+ct*7)*(.9+.15*fl));
  nukeGlow.material.opacity=Math.max(0,1-ct/6.5)*.9*fl;
 }else nukeGlow.visible=false;
 if(ct<10){
  const capY=7+Math.min(ct,8.5)*4.6;
  const warm=Math.max(0,1-ct/3);
  let n=Math.ceil(dt*30);
  while(n-->0){
   const a=rand(0,6.28),r=rand(0,2.8);
   const hot=warm*Math.pow(Math.random(),.6);
   spawnPuff(nuke.x+Math.cos(a)*r,rand(2,Math.max(5,capY*.82)),nuke.z+Math.sin(a)*r,
    -Math.sin(a)*rand(1,2.6),rand(4.5,7.5),Math.cos(a)*rand(1,2.6),
    .14+2.6*hot,.12+.9*hot,.1+.16*hot,.07,.065,.06,
    .72,rand(3.5,5.5),rand(1.7,2.5),rand(8,12),.95,.5);
  }
  n=Math.ceil(dt*34);
  while(n-->0){
   const a=rand(0,6.28),rr=rand(0,3.2);
   const hot=warm*Math.pow(Math.random(),.6);
   spawnPuff(nuke.x+Math.cos(a)*rr,capY+rand(-2,2.5),nuke.z+Math.sin(a)*rr,
    Math.cos(a)*rand(3.5,7),rand(1.5,3.6),Math.sin(a)*rand(3.5,7),
    .16+2.2*hot,.13+.8*hot,.11+.15*hot,.1,.093,.088,
    .74,rand(4.5,7.5),rand(1.9,2.7),rand(9,13),.4,.45);
  }
  if(ct<4.5){
   n=Math.ceil(dt*24);
   while(n-->0){
    const a=rand(0,6.28);
    const rr=Math.min(nuke.front,Rmax)*rand(.65,1);
    spawnPuff(nuke.x+Math.cos(a)*rr,rand(.5,2.5),nuke.z+Math.sin(a)*rr,
     Math.cos(a)*rand(7,12),rand(1,3),Math.sin(a)*rand(7,12),
     .62,.55,.46,.34,.31,.28,
     .5,rand(3,5.5),rand(2.2,3.2),rand(3,5.5),.25,1);
   }
  }
  if(ct<5){
   let m=Math.ceil(dt*(ct<1.4?230:120));
   while(m-->0){
    const a=rand(0,6.28),r=rand(0,2.8);
    const inCap=Math.random()<.45&&ct>1;
    const fy=inCap?capY+rand(-2.5,1.5):rand(3,Math.max(6,capY*.6));
    psA.spawn(nuke.x+Math.cos(a)*r,fy,nuke.z+Math.sin(a)*r,
     Math.cos(a)*rand(1.5,5),rand(3,10),Math.sin(a)*rand(1.5,5),
     1,.3+.25*Math.random(),.07,.9,rand(1.8,3.4),rand(.3,.7),3,1.2,-.3);
   }
  }
 }
 if(ct<5){
  nukeLight.position.set(nuke.x,6+ct*4.2,nuke.z);
  if(ct>.45)nukeLight.color.setHex(0xff8f3a);
  const flick=.72+.28*Math.sin(T*42+Math.sin(T*23)*3);
  nukeLight.intensity=Math.max(nukeLight.intensity*(1-dt*.85),Math.pow(1-ct/5,1.4)*8500*flick);
 }else nukeLight.intensity*=Math.max(0,1-dt*1.4);
 nuke.expo=Math.max(0,nuke.expo-dt*1.05);
 renderer.toneMappingExposure=1.12+nuke.expo;
 if(ct>10.5){
  nuke.on=false;
  nukeLight.intensity=0;
  nukeGlow.visible=false;
  renderer.toneMappingExposure=1.12;
 }
}

function explode(x,y,z,R,pw=1,opts={}){
 const iR=Math.ceil(R),R2=R*R;
 const x0=Math.round(x-.5),y0=Math.round(y-.5),z0=Math.round(z-.5);
 for(let dy=-iR;dy<=iR;dy++){
  const cy=y0+dy;
  if(cy<0)continue;
  for(let dx=-iR;dx<=iR;dx++)for(let dz=-iR;dz<=iR;dz++){
   const d2=dx*dx+dy*dy+dz*dz;
   if(d2>R2)continue;
   const s=map.get(K(x0+dx,cy,z0+dz));
   if(s===undefined)continue;
   const d=Math.sqrt(d2),f=1-d/R;
   if(Math.random()<f*1.35+.06){
    const inv=1/(d+.4);
    const nx=(vX[s]+.5-x)*inv,ny=(vY[s]+.5-y)*inv,nz=(vZ[s]+.5-z)*inv;
    const sp=(12+34*f)*pw;
    destroyVoxel(s,nx*sp+rand(-3,3),Math.abs(ny)*sp*.7+rand(3,7)+9*f*pw,nz*sp+rand(-3,3));
   }else if(opts.charOk!==false&&f<.55&&Math.random()<.55)charVoxel(s);
  }
 }
 const wr=R*2,wr2=wr*wr;
 for(let i=0;i<dCount;i++){
  const dx=dX[i]-x,dy=dY[i]-y,dz=dZ[i]-z;
  const d2=dx*dx+dy*dy+dz*dz;
  if(d2<wr2){
   const d=Math.sqrt(d2)+.4,f=1-d/wr;
   const imp=f*30*pw/d;
   dVX[i]+=dx*imp;dVY[i]+=Math.abs(dy)*imp+f*12;dVZ[i]+=dz*imp;
   dRest[i]=0;dFade[i]=0;
  }
 }
 for(const p of peds){
  if(!p.alive)continue;
  const dx=p.x-x,dz=p.z-z;
  const kr=R*1.35;
  if(dx*dx+dz*dz<kr*kr){
   const d=Math.hypot(dx,dz)+.3;
   killPed(p,dx/d*(14+R)*pw,8+R*.8,dz/d*(14+R)*pw);
  }
 }
 for(const c of dcars){
  if(!c.alive)continue;
  const[cx2,cz2]=carXZ(c);
  const dx=cx2-x,dz=cz2-z;
  const kr=R*1.5;
  if(dx*dx+dz*dz<kr*kr){
   const d=Math.hypot(dx,dz)+.3;
   killCar(c,dx/d*(16+R)*pw,10,dz/d*(16+R)*pw);
  }
 }
 panicSet(x,z,6);
 const fire=opts.fire===undefined?1:opts.fire;
 fxFire(x,y,z,clamp(Math.round(14*R*fire),0,130),1+R*.06);
 fxSpark(x,y,z,Math.round(3*R),1);
 fxSmoke(x,y+1,z,Math.round(5*R),1.4);
 fxDust(x,Math.max(1,y*.4),z,Math.round(5*R));
 ringFX(x,Math.max(1,y),z,R*2.1);
 if(opts.decal!==false&&y<3.5)addDecal(x,z,opts.decal||R*1.25);
 shakeAmp+=clamp(.05*R*pw,.1,1.1);
 SFX.blast(clamp(.4+.09*R*pw,.4,1.6));
}

function pendingUpdate(dt){
 for(let i=pending.length-1;i>=0;i--){
  const p=pending[i];
  p.t-=dt;
  if(p.t<=0){
   if(vAlive[p.s]){
    destroyVoxel(p.s,rand(-1.5,1.5),rand(-1,.5),rand(-1.5,1.5));
    if(Math.random()<.06)fxDust(vX[p.s],vY[p.s],vZ[p.s],1);
   }
   pending[i]=pending[pending.length-1];
   pending.pop();
  }
 }
}

function debrisUpdate(dt){
 const colA=debrisMesh.instanceColor;
 let i=0;
 while(i<dCount){
  if(dFade[i]){
   dS[i]-=dt*2.4;
   if(dS[i]<=.03){freeDebris(i);continue;}
  }else{
   dVY[i]-=36*dt;
   if(tor.on){
    const dx=dX[i]-tor.x,dz=dZ[i]-tor.z;
    const r=Math.hypot(dx,dz);
    const h=clamp(dY[i]/26,0,1);
    const R=.9+Math.pow(h,1.5)*9.5;
    if(r<R+11){
     const ramp=Math.min(1,tor.t/2)*Math.min(1,(tor.life-tor.t)/2);
     const F=78*ramp*(1-r/(R+11));
     const inv=1/(r+.3);
     dVX[i]+=(-dz*inv*F-dx*inv*F*.6)*dt;
     dVZ[i]+=(dx*inv*F-dz*inv*F*.6)*dt;
     if(r<R+4)dVY[i]+=(58+30*ramp)*dt;
     const s2=dVX[i]*dVX[i]+dVY[i]*dVY[i]+dVZ[i]*dVZ[i];
     if(s2>5200){const k=Math.sqrt(5200/s2);dVX[i]*=k;dVY[i]*=k;dVZ[i]*=k;}
     dRest[i]=0;
    }
   }
   if(hole.on){
    const dx=hole.x-dX[i],dy=hole.y-dY[i],dz=hole.z-dZ[i];
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<1.7){hole.eaten++;if(Math.random()<.4)fxSpark(hole.x,hole.y,hole.z,2,.6);freeDebris(i);continue;}
    if(d<hole.R*2.6){
     const a=140*hole.R/(d*d+10);
     const inv=1/d;
     dVX[i]+=(dx*inv*a+(-dz)*inv*a*.5)*dt;
     dVY[i]+=dy*inv*a*dt+36*dt*Math.min(1,a*.02);
     dVZ[i]+=(dz*inv*a+dx*inv*a*.5)*dt;
     dRest[i]=0;
    }
   }
   if(flood.phase>0){
    const wl=waterLevelAt(dX[i],dZ[i]);
    const depth=wl-dY[i];
    if(depth>0){
     if(dVY[i]<-5&&depth<1.2)fxSplash(dX[i],wl,dZ[i],2);
     dVY[i]+=Math.min(depth,.9)*52*dt;
     const dr=Math.max(0,1-3*dt);
     dVX[i]*=dr;dVY[i]*=Math.max(0,1-4.5*dt);dVZ[i]*=dr;
     dVX[i]+=(4.8+Math.sin(T*.5+dZ[i]*.05)*2.6)*dt;
     dVZ[i]+=Math.sin(T*.4+dX[i]*.04)*2.2*dt;
     dRest[i]=0;
    }
   }
   if(quake.on&&dRest[i]>0&&Math.random()<.25){
    dVX[i]+=rand(-2,2);dVY[i]+=rand(1,3);dVZ[i]+=rand(-2,2);dRest[i]=0;
   }
   const ox=dX[i],oy=dY[i],oz=dZ[i];
   dX[i]+=dVX[i]*dt;dY[i]+=dVY[i]*dt;dZ[i]+=dVZ[i]*dt;
   if(dX[i]<-108||dX[i]>108){dX[i]=ox;dVX[i]*=-.4;}
   if(dZ[i]<-108||dZ[i]>108){dZ[i]=oz;dVZ[i]*=-.4;}
   if(dY[i]>0&&dY[i]<200){
    const cx=Math.floor(dX[i]),cy=Math.floor(dY[i]),cz=Math.floor(dZ[i]);
    if(map.has(K(cx,cy,cz))){
     const px=dX[i]-(cx+.5),py=dY[i]-(cy+.5),pz=dZ[i]-(cz+.5);
     const ax=Math.abs(px),ay=Math.abs(py),az=Math.abs(pz);
     if(ay>=ax&&ay>=az){dY[i]=py>0?cy+1.02:cy-.02;dVY[i]*=-.28;dVX[i]*=.82;dVZ[i]*=.82;}
     else if(ax>=az){dX[i]=px>0?cx+1.02:cx-.02;dVX[i]*=-.3;}
     else{dZ[i]=pz>0?cz+1.02:cz-.02;dVZ[i]*=-.3;}
     dWX[i]*=.8;dWY[i]*=.8;dWZ[i]*=.8;
    }
   }
   const hs=dS[i]*.5;
   if(dY[i]<hs){
    dY[i]=hs;
    if(dVY[i]<-8&&Math.random()<.25)fxDust(dX[i],dY[i],dZ[i],1);
    dVY[i]*=-.28;
    dVX[i]*=.78;dVZ[i]*=.78;
    dWX[i]*=.75;dWY[i]*=.75;dWZ[i]*=.75;
    if(Math.abs(dVY[i])<1.2)dVY[i]=0;
   }
   const sp2=dVX[i]*dVX[i]+dVY[i]*dVY[i]+dVZ[i]*dVZ[i];
   const cyb=Math.floor(dY[i]-.6);
   const supported=dY[i]<=hs+.02||(cyb>=0&&map.has(K(Math.floor(dX[i]),cyb,Math.floor(dZ[i]))));
   if(sp2<.4&&supported){
    dRest[i]+=dt;
    dVX[i]*=.6;dVZ[i]*=.6;
    if(dRest[i]>dSleep[i])dFade[i]=1;
   }else dRest[i]=0;
   if(sp2>.3){dRX[i]+=dWX[i]*dt;dRY[i]+=dWY[i]*dt;dRZ[i]+=dWZ[i]*dt;}
  }
  dummy.position.set(dX[i],dY[i],dZ[i]);
  dummy.rotation.set(dRX[i],dRY[i],dRZ[i]);
  dummy.scale.setScalar(Math.max(.03,dS[i]));
  dummy.updateMatrix();
  debrisMesh.setMatrixAt(i,dummy.matrix);
  colA.setXYZ(i,dCR[i],dCG[i],dCB[i]);
  i++;
 }
 debrisMesh.count=dCount;
 debrisMesh.instanceMatrix.needsUpdate=true;
 colA.needsUpdate=true;
}

function toolClick(id){
 SFX.ensure();
 const t=TOOLS.find(x=>x.id===id);
 if(t&&t.t){
  if(id==='tornado'&&tor.on){
   if(tor.life-tor.t>1.3)tor.life=tor.t+1.3;
   else tornadoStop();
   mode=null;
   setHint('🌪️ 龙卷风正在消散…');
   return;
  }
  if(id==='hole'&&hole.on){
   hole.t=Math.max(hole.t,6.3);
   mode=null;
   setHint('🕳️ 黑洞坍缩引爆！');
   return;
  }
  mode=mode===id?null:id;
  setHint(mode?'点击地图释放【'+t.n+'】 · 右键 / ESC 取消':HINT_DEF);
  return;
 }
 if(id==='quake'){
  if(quake.on)quake.t=Math.min(quake.t,.3);

 else if(id==='flood')floodToggle();

renderer.domElement.addEventListener('pointerdown',ev=>{downX=ev.clientX;downY=ev.clientY;});
renderer.domElement.addEventListener('pointerup',ev=>{
 if(ev.button!==0)return;
 if(Math.hypot(ev.clientX-downX,ev.clientY-downY)>7)return;
 if(!mode)return;
 const p=groundPoint(ev);
 if(p)fireTool(p);
});
renderer.domElement.addEventListener('pointermove',ev=>{hoverPt=groundPoint(ev);});
addEventListener('contextmenu',ev=>{if(mode){mode=null;setHint(HINT_DEF);ev.preventDefault();}});
const keys=new Set();
addEventListener('keydown',ev=>{
 const k=ev.key.toLowerCase();
 if(k==='escape'){mode=null;setHint(HINT_DEF);}
 if(k.startsWith('arrow'))ev.preventDefault();
 keys.add(k);
});
addEventListener('keyup',ev=>keys.delete(ev.key.toLowerCase()));
function steerUpdate(rdt){
 const kx=((keys.has('d')||keys.has('arrowright'))?1:0)-((keys.has('a')||keys.has('arrowleft'))?1:0);
 const kz=((keys.has('s')||keys.has('arrowdown'))?1:0)-((keys.has('w')||keys.has('arrowup'))?1:0);
 if(!kx&&!kz)return;
 let fx=controls.target.x-camera.position.x,fz=controls.target.z-camera.position.z;
 const fl=Math.hypot(fx,fz)||1;
 fx/=fl;fz/=fl;
 const mx=(-fz*kx-fx*kz)*34*rdt;
 const mz=(fx*kx-fz*kz)*34*rdt;
 if(tor.on){
  tor.x=clamp(tor.x+mx,-78,78);
  tor.z=clamp(tor.z+mz,-78,78);
  tor.tx=null;
 }else if(hole.on){
  hole.x=clamp(hole.x+mx,-78,78);
  hole.z=clamp(hole.z+mz,-78,78);
 }else if(storm.on){
  if(storm.cx===null){storm.cx=controls.target.x;storm.cz=controls.target.z;}
  storm.cx=clamp(storm.cx+mx,-74,74);
  storm.cz=clamp(storm.cz+mz,-74,74);
 }
}

function rebuild(){
 map.clear();
 vCount=0;aliveVox=0;
 structSlots.length=0;
 dirtyStructs.clear();
 pending.length=0;
 dCount=0;debrisMesh.count=0;
 psA.n=0;psN.n=0;
 for(const r of rings){scene.remove(r.m);r.m.material.dispose();}
 rings.length=0;
 for(const d of decals){cityGroup.remove(d.m);d.m.material.dispose();d.m.geometry.dispose();}
 decals.length=0;
 for(const b of bolts){scene.remove(b.g);b.g.traverse(o=>{if(o.geometry)o.geometry.dispose();});b.matC.dispose();b.matG.dispose();}
 bolts.length=0;
 for(const m of meteors){scene.remove(m.mesh);m.mesh.geometry.dispose();m.mesh.material.dispose();}
 meteors.length=0;
 for(const c of chunks){scene.remove(c.mesh);c.mesh.dispose();}
 chunks.length=0;
 if(tor.on)tornadoStop();
 storm.on=false;storm.cx=null;
 if(hole.on){hole.on=false;holeCore.visible=false;holeGlow.visible=false;}
 if(nuke.on){
  if(nuke.bomb){
   scene.remove(nuke.bomb);
   nuke.bomb.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});
   nuke.bomb=null;
  }
  nuke.on=false;nukeLight.intensity=0;nukeGlow.visible=false;renderer.toneMappingExposure=1.12;
 }
 qN=0;puffGeo.instanceCount=0;
 if(quake.on){quake.on=false;SFX.loopStop('rumble');}
 flood.phase=0;flood.level=-3;waterMesh.visible=false;
 cityGroup.position.set(0,0,0);
 shakeAmp=0;
 buildCity();
 respawnAll();
}
buildCity();
respawnAll();

const composer=new EffectComposer(renderer,new THREE.WebGLRenderTarget(innerWidth,innerHeight,{type:THREE.HalfFloatType,samples:4}));
composer.addPass(new RenderPass(scene,camera));
const TiltH={
 uniforms:{tDiffuse:{value:null},res:{value:innerWidth},focus:{value:.44},range:{value:.30},maxblur:{value:5}},
 vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
 fragmentShader:'uniform sampler2D tDiffuse;uniform float res;uniform float focus;uniform float range;uniform float maxblur;varying vec2 vUv;void main(){float b=maxblur*smoothstep(0.0,range,abs(vUv.y-focus));float s=b/(4.0*res);vec4 sum=vec4(0.0);sum+=texture2D(tDiffuse,vec2(vUv.x-4.0*s,vUv.y))*0.051;sum+=texture2D(tDiffuse,vec2(vUv.x-3.0*s,vUv.y))*0.0918;sum+=texture2D(tDiffuse,vec2(vUv.x-2.0*s,vUv.y))*0.12245;sum+=texture2D(tDiffuse,vec2(vUv.x-1.0*s,vUv.y))*0.1531;sum+=texture2D(tDiffuse,vUv)*0.1633;sum+=texture2D(tDiffuse,vec2(vUv.x+1.0*s,vUv.y))*0.1531;sum+=texture2D(tDiffuse,vec2(vUv.x+2.0*s,vUv.y))*0.12245;sum+=texture2D(tDiffuse,vec2(vUv.x+3.0*s,vUv.y))*0.0918;sum+=texture2D(tDiffuse,vec2(vUv.x+4.0*s,vUv.y))*0.051;gl_FragColor=sum;}'};
const TiltV={
 uniforms:{tDiffuse:{value:null},res:{value:innerHeight},focus:{value:.44},range:{value:.30},maxblur:{value:5}},
 vertexShader:TiltH.vertexShader,
 fragmentShader:'uniform sampler2D tDiffuse;uniform float res;uniform float focus;uniform float range;uniform float maxblur;varying vec2 vUv;void main(){float b=maxblur*smoothstep(0.0,range,abs(vUv.y-focus));float s=b/(4.0*res);vec4 sum=vec4(0.0);sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y-4.0*s))*0.051;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y-3.0*s))*0.0918;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y-2.0*s))*0.12245;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y-1.0*s))*0.1531;sum+=texture2D(tDiffuse,vUv)*0.1633;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y+1.0*s))*0.1531;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y+2.0*s))*0.12245;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y+3.0*s))*0.0918;sum+=texture2D(tDiffuse,vec2(vUv.x,vUv.y+4.0*s))*0.051;gl_FragColor=sum;}'};
const Grade={
 uniforms:{tDiffuse:{value:null},sat:{value:1.24},con:{value:1.05},vig:{value:.34}},
 vertexShader:TiltH.vertexShader,
 fragmentShader:'uniform sampler2D tDiffuse;uniform float sat;uniform float con;uniform float vig;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);float l=dot(c.rgb,vec3(0.299,0.587,0.114));c.rgb=mix(vec3(l),c.rgb,sat);c.rgb=(c.rgb-0.5)*con+0.5;c.rgb*=vec3(1.03,1.0,0.975);float d=distance(vUv,vec2(0.5,0.46));c.rgb*=1.0-smoothstep(0.5,0.95,d)*vig;gl_FragColor=c;}'};
const passH=new ShaderPass(TiltH),passV=new ShaderPass(TiltV),passG=new ShaderPass(Grade);
composer.addPass(passH);composer.addPass(passV);composer.addPass(passG);
composer.addPass(new OutputPass());
elBlur.addEventListener('input',()=>{
 passH.uniforms.maxblur.value=parseFloat(elBlur.value);
 passV.uniforms.maxblur.value=parseFloat(elBlur.value);
});

addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
 composer.setSize(innerWidth,innerHeight);
 passH.uniforms.res.value=innerWidth;
 passV.uniforms.res.value=innerHeight;
});

let last=performance.now(),fpsT=0,fpsN=0,fps=60,statT=0,loaded=false;
const TOOL_COLORS={boom:0xffa94d,meteor:0xff6b6b,bolt:0x66d9e8,tornado:0xb197fc,hole:0xe599f7,nuke:0xff8787};
function loop(){
 requestAnimationFrame(loop);
 const now=performance.now();
 const rdt=Math.min(.05,(now-last)/1000);
 last=now;
 const dt=rdt*timeScale;
 T+=dt;
 fpsT+=rdt;fpsN++;
 if(fpsT>=.5){fps=Math.round(fpsN/fpsT);fpsT=0;fpsN=0;}
 camera.position.sub(shakePrev);
 controls.update();
 shakeAmp=Math.max(0,shakeAmp-rdt*2.2);
 shakePrev.set(rand(-1,1)*shakeAmp,rand(-1,1)*shakeAmp*.7,rand(-1,1)*shakeAmp);
 camera.position.add(shakePrev);
 steerUpdate(rdt);
 quakeUpdate(dt);
 floodUpdate(dt);
 tornadoUpdate(dt);
 stormUpdate(dt);
 meteorsUpdate(dt);
 holeUpdate(dt);
 nukeUpdate(dt);
 updateChunks(dt);
 pedsUpdate(dt);
 carsUpdate(dt);
 processDirty();
 pendingUpdate(dt);
 debrisUpdate(dt);
 psA.update(dt);
 psN.update(dt);
 puffUpdate(dt);
 for(let i=rings.length-1;i>=0;i--){
  const r=rings[i];
  r.t+=dt;
  const k=r.t/r.life;
  if(k>=1){scene.remove(r.m);r.m.material.dispose();rings.splice(i,1);continue;}
  const e=1-Math.pow(1-k,3);
  r.m.scale.setScalar(Math.max(.01,r.R*e));
  r.m.material.opacity=.75*(1-k);
 }
 for(let i=decals.length-1;i>=0;i--){
  const d=decals[i];
  d.t+=dt;
  if(d.t>45){cityGroup.remove(d.m);d.m.material.dispose();d.m.geometry.dispose();decals.splice(i,1);}
  else if(d.t>35)d.m.material.opacity=1-(d.t-35)/10;
 }
 for(const c of clouds){
  c.position.x+=c.userData.spd*dt;
  if(c.position.x>190)c.position.x=-190;
 }
 if(mode&&hoverPt){
  reticle.visible=true;
  reticle.position.set(hoverPt.x,.15,hoverPt.z);
  const R=toolRadius()*(1+.05*Math.sin(T*6));
  reticle.scale.setScalar(R);
  const col=TOOL_COLORS[mode]||0xffffff;
  retRing.material.color.setHex(col);
  retDisc.material.color.setHex(col);
 }else reticle.visible=false;
 if(matDirty){staticMesh.instanceMatrix.needsUpdate=true;matDirty=false;}
 if(colDirty){staticMesh.instanceColor.needsUpdate=true;colDirty=false;}
 barUpdate();
 statT+=rdt;
 if(statT>.4){
  statT=0;
  let pn=0;
  for(const p of peds)if(p.alive)pn++;
  elStats.textContent='体素 '+aliveVox.toLocaleString()+' · 碎片 '+dCount.toLocaleString()+' · 行人 '+pn+' · '+fps+' FPS';
 }
 composer.render();
 if(!loaded){loaded=true;elLoad.remove();}
}
loop();
</script>
