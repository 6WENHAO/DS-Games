<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NES 模拟器</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <h1>HTML5 <span>NES</span> 模拟器</h1>
</header>
<main class="app-main">
  <div class="screen-wrap" id="screenWrap">
<!-- 画面：canvas 固定为 NES 原生分辨率 256×240，通过 CSS 放大（保持像素风） -->
    <canvas id="screen" width="256" height="240"></canvas>
    <div class="drop-hint" id="dropHint">
      <p class="drop-hint-title">未加载游戏</p>
      <p>点击「打开 ROM」或将 .nes 文件拖放到此处</p>
    </div>
  </div>
  <div class="toolbar">
    <label class="btn btn-primary">打开 ROM<input type="file" id="romInput" accept=".nes" hidden></label>
    <button class="btn" id="btnPause" disabled>暂停</button>
    <button class="btn" id="btnReset" disabled>重置</button>
    <button class="btn" id="btnShot" disabled>截图</button>
    <button class="btn" id="btnFull">全屏</button>
    <label class="volume">音量<input type="range" id="volume" min="0" max="100" value="50"></label>
  </div>
  <p class="status" id="status">未加载 ROM · 支持 Mapper 0 / 1 / 2 / 3 / 4 / 7 / 11 / 66</p>
  <section class="help">
    <table class="keys">
      <tr><th>功能</th><th>按键</th></tr>
      <tr><td>十字键</td><td>方向键 或 W A S D</td></tr>
      <tr><td>A</td><td>X 或 K</td></tr>
      <tr><td>B</td><td>Z 或 J</td></tr>
      <tr><td>Start</td><td>Enter</td></tr>
      <tr><td>Select</td><td>Shift</td></tr>
      <tr><td>暂停 / 继续</td><td>P</td></tr>
      <tr><td>手柄</td><td>自动检测（标准映射）</td></tr>
    </table>
    <p class="note">本模拟器不包含任何游戏 ROM，请加载您拥有合法授权的 .nes 文件。带电池的游戏进度会自动保存在浏览器本地存储中。</p>
  </section>
</main>
<!--
  脚本加载顺序：核心模块（cpu/ppu/apu/controller/cartridge/mappers/nes）
  不依赖任何浏览器 API，可独立在 Node 中做单元测试；
  main.js 是唯一的 UI 层，必须最后加载（它会实例化 NES 并接管页面）。
-->
<script src="js/cpu.js"></script>
<script src="js/ppu.js"></script>
<script src="js/apu.js"></script>
<script src="js/controller.js"></script>
<script src="js/cartridge.js"></script>
<script src="js/mappers.js"></script>
<script src="js/nes.js"></script>
<script src="js/main.js"></script>
</body>
</html>
